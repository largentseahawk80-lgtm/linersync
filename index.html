<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#04101d" />
    <title>LinerSync Field Current App</title>
    <style>
      html, body, #root { min-height: 100%; margin: 0; }
      body { background: radial-gradient(circle at top left, #0a2242 0%, #061326 42%, #04101d 100%); color: #f5f7fb; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      .boot-screen { min-height: 100vh; display: grid; place-items: center; padding: 24px; box-sizing: border-box; }
      .boot-card { width: min(560px, 100%); border: 1px solid rgba(255,255,255,.14); border-radius: 24px; background: rgba(10,22,39,.92); box-shadow: 0 24px 60px rgba(0,0,0,.34); padding: 22px; }
      .boot-title { color: #ffb25a; font-weight: 1000; letter-spacing: -.04em; font-size: 30px; margin: 0 0 8px; }
      .boot-muted { color: #a8b8cf; line-height: 1.45; margin: 0; }
      .boot-error { color: #fecaca; white-space: pre-wrap; font-size: 13px; margin-top: 12px; }
    </style>
    <script>
      window.addEventListener('error', function(event) {
        var root = document.getElementById('root');
        if (!root) return;
        root.innerHTML = '<div class="boot-screen"><div class="boot-card"><h1 class="boot-title">LinerSync boot error</h1><p class="boot-muted">The page loaded, but the app JavaScript failed before React could render.</p><div class="boot-error">' + String(event.message || 'Unknown error') + '</div></div></div>';
      });
      window.addEventListener('unhandledrejection', function(event) {
        var root = document.getElementById('root');
        if (!root) return;
        root.innerHTML = '<div class="boot-screen"><div class="boot-card"><h1 class="boot-title">LinerSync async boot error</h1><p class="boot-muted">The page loaded, but an async startup error stopped the app.</p><div class="boot-error">' + String((event.reason && event.reason.message) || event.reason || 'Unknown promise error') + '</div></div></div>';
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div class="boot-screen">
        <div class="boot-card">
          <h1 class="boot-title">LinerSync is loading</h1>
          <p class="boot-muted">If this stays on screen, the deployed JavaScript did not finish loading. This boot panel is here to stop silent white-screen failures.</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
