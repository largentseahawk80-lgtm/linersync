<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>LinerSync Start</title><style>body{margin:0;background:#020617;color:#e5e7eb;font-family:system-ui,Segoe UI,sans-serif}.wrap{max-width:430px;margin:auto;padding:10px 10px 128px}.card{background:#0f172a;border:1px solid #334155;border-radius:16px;padding:12px;margin:9px 0}h1{margin:0 0 8px;font-size:24px}.sub{color:#94a3b8;font-size:13px}label{display:block;margin-top:10px;font-size:12px;font-weight:900;color:#cbd5e1}input,select,textarea{width:100%;box-sizing:border-box;background:#111827;color:white;border:1px solid #334155;border-radius:13px;padding:12px;font-size:16px}textarea{min-height:64px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btn{width:100%;border:0;border-radius:15px;padding:16px;margin:8px 0;font-weight:950;font-size:16px;color:white}.green{background:#16a34a}.blue{background:#2563eb}.gold{background:#ca8a04}.red{background:#dc2626}.gray{background:#334155}.notice{background:#020617;border:1px solid #334155;border-radius:14px;padding:11px;margin:9px 0}.ok{border-color:#16a34a;color:#bbf7d0}.warn{border-color:#f97316;color:#fed7aa}.bad{border-color:#dc2626;color:#fecaca}.project{padding:12px;border:1px solid #334155;border-radius:15px;margin:10px 0;background:#020617}.project.active{border-color:#16a34a;background:rgba(22,163,74,.1)}.project b{display:block;font-size:20px}.project span{color:#94a3b8;font-size:16px}.bottom{position:fixed;left:50%;transform:translateX(-50%);width:min(100%,430px);bottom:0;background:#0f172a;border-top:1px solid #334155;padding:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:7px;border-radius:16px 16px 0 0}.nav{border-radius:14px;padding:13px 4px;color:white;text-decoration:none;text-align:center;font-weight:950;font-size:12px}@media(max-width:390px){.wrap{padding-left:8px;padding-right:8px}.btn{font-size:15px}.project b{font-size:18px}.project span{font-size:15px}}</style></head><body><main class="wrap"><section class="card"><h1>LinerSync Start</h1><p class="sub">Create a new project or select an existing project.</p><div id="msg" class="notice warn">Ready.</div></section><section class="card"><h3>Create New Project</h3><div class="grid"><div><label>Project Name</label><input id="name" placeholder="CLAYTON"></div><div><label>Area / Cell / Pond</label><input id="area" placeholder="LAGOON3"></div><div><label>Material</label><select id="material"><option>60-mil HDPE Smooth</option><option>60-mil HDPE Textured</option><option>80-mil HDPE Smooth</option><option>80-mil HDPE Textured</option><option>40-mil LLDPE Smooth</option><option>40-mil LLDPE Textured</option><option>Other</option></select></div><div><label>Thickness</label><select id="thickness"><option>60 mil</option><option>80 mil</option><option>40 mil</option><option>Other</option></select></div><div><label>Width ft</label><input id="width" value="23" type="number"></div><div><label>Active Roll</label><input id="roll" placeholder="1234"></div><div><label>Air Start PSI</label><input id="airStart" value="40" type="number"></div><div><label>Air Hold Min</label><input id="airHold" value="5" type="number"></div><div><label>Air Max Drop</label><input id="airDrop" value="4" type="number"></div></div><label>Notes</label><textarea id="notes" placeholder="Optional"></textarea><button class="btn green" id="save">CREATE PROJECT</button><button class="btn blue" id="saveOpen">CREATE + OPEN QC LOGS</button></section><section class="card"><h3>Existing Projects</h3><div id="list" class="notice">Loading projects...</div></section></main><nav class="bottom"><a class="nav blue" href="./capture-menu.html">CAPTURE</a><a class="nav gold" href="./workflow-checklist.html">FLOW</a><a class="nav red" href="./final-package.html">FINAL</a><a class="nav green" href="./office-package-builder.html">OFFICE</a></nav><script>var DB='linersync-db';var STORE='projects';function q(id){return document.getElementById(id)}function v(id){var e=q(id);return e?String(e.value||'').trim():''}function n(id,d){var x=Number(v(id));return isFinite(x)&&x>0?x:d}function msg(c,t){q('msg').className='notice '+c;q('msg').textContent=t}function html(s){return String(s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}function makeId(){return Date.now()+'-'+Math.random().toString(36).slice(2,7)}function openDb(){return new Promise(function(resolve,reject){var r=indexedDB.open(DB,Date.now());r.onupgradeneeded=function(e){var db=e.target.result;if(!db.objectStoreNames.contains(STORE)){db.createObjectStore(STORE,{keyPath:'id'})}};r.onsuccess=function(){resolve(r.result)};r.onerror=function(){reject(r.error)}})}function saveProject(p){return openDb().then(function(db){return new Promise(function(resolve,reject){var tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(p);tx.oncomplete=function(){db.close();resolve()};tx.onerror=function(){reject(tx.error)}})})}function loadProjects(){return openDb().then(function(db){return new Promise(function(resolve,reject){var tx=db.transaction(STORE,'readonly');var r=tx.objectStore(STORE).getAll();r.onsuccess=function(){db.close();resolve(r.result||[])};r.onerror=function(){reject(r.error)}})})}function setActive(pid){localStorage.setItem('linersync-active-project-id',pid);localStorage.setItem('linersync-current-project-id',pid)}function activeId(){return localStorage.getItem('linersync-active-project-id')||''}function projectFromForm(){var mat=v('material')||'60-mil HDPE Smooth';return{id:makeId(),name:v('name')||('FIELD PROJECT '+new Date().toLocaleString()),area:v('area'),material:mat,notes:v('notes'),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),data:{activeThickness:v('thickness')||'60 mil',activeWidth:v('width')||'23',activeRoll:v('roll'),activeType:mat,airStartPsi:n('airStart',40),airHoldMin:n('airHold',5),airMaxDropPsi:n('airDrop',4),panels:[],rolls:[],seams:[],trialWelds:[],extWelds:[],airTests:[],dTests:[],vacuums:[],dronePhotos:[]}}}function selectProject(pid,name,openNow){setActive(pid);msg('ok','Selected: '+name);render();if(openNow){setTimeout(function(){location.href='./field-capture.html#header'},250)}}function render(){loadProjects().then(function(list){var aid=activeId();if(!list.length){q('list').className='notice warn';q('list').textContent='No projects yet.';return}q('list').className='';q('list').innerHTML='';list.forEach(function(p){var box=document.createElement('div');box.className='project'+(p.id===aid?' active':'');var title=document.createElement('b');title.textContent=p.name||'Unnamed';var sub=document.createElement('span');sub.textContent=(p.area||'No area')+' | '+(p.material||'No material');var use=document.createElement('button');use.className='btn '+(p.id===aid?'green':'blue');use.textContent=p.id===aid?'ACTIVE PROJECT':'USE THIS PROJECT';use.addEventListener('click',function(){selectProject(p.id,p.name||'Unnamed',false)});var open=document.createElement('button');open.className='btn gray';open.textContent='USE + OPEN QC LOGS';open.addEventListener('click',function(){selectProject(p.id,p.name||'Unnamed',true)});box.appendChild(title);box.appendChild(sub);box.appendChild(use);box.appendChild(open);q('list').appendChild(box)})}).catch(function(e){q('list').className='notice bad';q('list').textContent='Could not load projects: '+(e.message||e)})}function create(openNow){msg('warn','Creating project...');var p=projectFromForm();saveProject(p).then(function(){setActive(p.id);msg('ok','Created: '+p.name);render();if(openNow){setTimeout(function(){location.href='./field-capture.html#header'},250)}}).catch(function(e){msg('bad','Create failed: '+(e.message||e))})}q('save').addEventListener('click',function(){create(false)});q('saveOpen').addEventListener('click',function(){create(true)});render();</script></body></html>
