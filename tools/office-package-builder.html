<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>LinerSync Office Package Builder</title><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script><style>:root{--bg:#020617;--card:#0f172a;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--blue:#2563eb;--green:#16a34a;--gold:#ca8a04;--red:#dc2626;--cyan:#0891b2;--orange:#f97316}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:900px;margin:0 auto;padding:14px 12px 110px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0}h1{font-size:25px;margin:0 0 6px}.sub,.small{color:var(--muted);font-size:13px}.strip{display:flex;gap:8px;overflow-x:auto;white-space:nowrap;padding:8px 0}.chip{flex:0 0 auto;border-radius:999px;padding:10px 13px;font-weight:950;font-size:12px;color:#fff;text-decoration:none}.gray{background:#334155}.gold{background:var(--gold)}.red{background:var(--red)}.green{background:var(--green)}.cyan{background:var(--cyan)}.blue{background:var(--blue)}.orange{background:var(--orange)}select,input{width:100%;background:#111827;color:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;font-size:16px}label{display:block;margin-top:10px;font-size:12px;font-weight:950;color:#cbd5e1}.btn{width:100%;border:0;border-radius:15px;padding:16px;margin:9px 0;font-weight:950;font-size:15px;color:#fff;background:var(--blue)}.notice{background:#020617;border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0}.ok{border-color:var(--green);color:#bbf7d0}.warn{border-color:var(--orange);color:#fed7aa}.bad{border-color:var(--red);color:#fecaca}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.box{background:#020617;border:1px solid #1e293b;border-radius:14px;padding:10px}.box strong{display:block;font-size:24px}.box span{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:950}.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(15,23,42,.96);border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.nav{border:0;border-radius:14px;padding:12px 4px;min-height:50px;color:#fff;font-weight:950;font-size:12px;text-decoration:none;text-align:center}@media(min-width:760px){.grid{grid-template-columns:repeat(4,1fr)}.bottom{left:50%;transform:translateX(-50%);max-width:720px;border-radius:18px 18px 0 0}}@media(max-width:430px){.wrap{padding:10px 10px 108px}.card{padding:12px}}</style></head><body><main class="wrap"><section class="card"><h1>Office Package Builder</h1><p class="sub">Builds the office-ready CQA workbook, daily as-built, clean summary, and raw backup from every saved module.</p><div class="strip"><a class="chip gray" href="./final-package.html">← FINAL</a><a class="chip blue" href="./capture-menu.html">CAPTURE</a><a class="chip gold" href="./mythos-agent.html">MYTHOS</a><a class="chip green" href="./export-center.html">EXPORTS</a></div><div id="status">Loading projects...</div></section><section class="card"><label>Project</label><select id="projectSelect"></select><label>Package Date</label><input id="dateInput" type="date"><div id="counts"></div><div id="warning" class="notice">Ready.</div><button class="btn green" id="fullBtn">BUILD FULL OFFICE PACKAGE</button><button class="btn blue" id="workbookBtn">DOWNLOAD CQA WORKBOOK ONLY</button><button class="btn cyan" id="dailyBtn">DOWNLOAD DAILY AS-BUILT ONLY</button><button class="btn orange" id="summaryBtn">DOWNLOAD CLEAN SUMMARY ONLY</button><button class="btn gray" id="jsonBtn">DOWNLOAD RAW BACKUP JSON</button><div id="last" class="notice">No export started.</div></section></main><nav class="bottom"><a class="nav blue" href="./capture-menu.html">CAPTURE</a><a class="nav gold" href="./mythos-agent.html">MYTHOS</a><a class="nav red" href="./final-package.html">FINAL</a><a class="nav green" href="./export-center.html">EXPORT</a></nav><script>const DBN='linersync-db',DBV=2,STORE='projects';let projects=[];const $=id=>document.getElementById(id);const today=()=>new Date().toISOString().slice(0,10);const safe=s=>String(s||'project').replace(/[^a-z0-9_-]+/gi,'_').replace(/^_+|_+$/g,'')||'project';const val=v=>v==null?'':v;const yes=v=>v===true?'PASS':v===false?'FAIL':(v||'');const arr=v=>Array.isArray(v)?v.join(' / '):(v||'');function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DBN,2);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);r.onupgradeneeded=()=>{}})}function getProjects(){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly'),r=tx.objectStore(STORE).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error)}))}function cur(){return projects[$('projectSelect').selectedIndex]||null}function d(p){return p?.data||{}}function gps(x){return x?.gps||{lat:x?.lat,lng:x?.lng,acc:x?.acc}}function dl(name,content,type){const b=content instanceof Blob?content:new Blob([content],{type}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1000)}function rowsTest(x,n){if(Array.isArray(x?.tests)&&x.tests[n-1])return arr(x.tests[n-1]);return x?.['test'+n]||x?.['sample'+n]||''}function counts(p){const x=d(p);const c={panels:(x.panels||[]).length,rolls:(x.rolls||[]).length,seams:(x.seams||[]).length,wedge:(x.trialWelds||[]).length,extrusion:(x.extWelds||[]).length,air:(x.airTests||[]).length,dt:(x.dTests||[]).length,repairs:(x.vacuums||[]).length,drone:(x.dronePhotos||[]).length};c.total=Object.values(c).reduce((a,b)=>a+b,0);return c}function countCards(c){return '<div class="grid">'+Object.entries({Panels:c.panels,Rolls:c.rolls,Seams:c.seams,Wedge:c.wedge,Extrusion:c.extrusion,Air:c.air,DT:c.dt,Repairs:c.repairs,Drone:c.drone}).map(([k,v])=>`<div class="box"><strong>${v}</strong><span>${k}</span></div>`).join('')+'</div>'}function sheet(wb,name,h,r){const ws=XLSX.utils.aoa_to_sheet([h,...r]);ws['!cols']=h.map(x=>({wch:Math.max(14,String(x).length+2)}));XLSX.utils.book_append_sheet(wb,ws,name.slice(0,31))}function makeWorkbook(p,onlyDaily=false){if(!window.XLSX)throw new Error('XLSX library failed');const x=d(p),pan=x.panels||[],roll=x.rolls||[],seam=x.seams||[],wedge=x.trialWelds||[],extr=x.extWelds||[],air=x.airTests||[],dt=x.dTests||[],rep=x.vacuums||[],drone=x.dronePhotos||[],wb=XLSX.utils.book_new();sheet(wb,'PROJECT',['FIELD','VALUE'],[['Project Name',p.name],['Area / Cell',p.area],['Material',p.material],['Active Roll',x.activeRoll],['Active Width',x.activeWidth],['Air Start PSI',x.airStartPsi||40],['Air Hold Min',x.airHoldMin||5],['Air Max Drop PSI',x.airMaxDropPsi||4],['DT Rule','Every 500 ft on wedge seam'],['Export Date',new Date().toLocaleString()]]);if(!onlyDaily){sheet(wb,'PANEL PLACEMENT',['DATE','TIME','PANEL NUMBER','ROLL NUMBER','WIDTH','LENGTH','SQUARE FOOTAGE','ZONE','MATERIAL','THICKNESS','GPS LAT','GPS LNG','COMMENTS'],pan.map(r=>[r.date,r.time,r.num,r.roll,r.w,r.l,r.area,r.zone,r.material,r.thickness,gps(r).lat,gps(r).lng,r.comments]));sheet(wb,'ROLL INVENTORY',['DATE','TIME','ROLL NUMBER','MATERIAL','THICKNESS','WIDTH','LENGTH','SQUARE FOOTAGE','STATUS'],roll.map(r=>[r.date,r.time,r.num||r.rollNumber,r.material,r.thickness,r.w||r.width,r.l||r.length,r.area||r.sf,r.status]));sheet(wb,'WEDGE SEAM',['DATE','TIME','SEAM NUMBER','SEAMER','MACHINE','TEMP','SPEED','LENGTH FT','GPS LAT','GPS LNG','COMMENTS'],seam.map(r=>[r.date,r.time,r.num,r.seamer,r.machine,r.temp,r.speed,r.len,gps(r).lat,gps(r).lng,r.comments]));sheet(wb,'WEDGE WELD TEST',['DATE','TIME','QC','WELDER','MACHINE','TYPE','TEST #1','TEST #2','TEST #3','RESULT','GPS LAT','GPS LNG','COMMENTS'],wedge.map(r=>[r.date,r.time,r.qc,r.welder,r.machine,r.type||'Wedge Weld Test',rowsTest(r,1),rowsTest(r,2),rowsTest(r,3),r.result||yes(r.pass),gps(r).lat,gps(r).lng,r.comments]));sheet(wb,'EXTRUSION WELD TEST',['DATE','TIME','QC','WELDER','MACHINE','TYPE','TEST #1','TEST #2','TEST #3','RESULT','GPS LAT','GPS LNG','COMMENTS'],extr.map(r=>[r.date,r.time,r.qc,r.welder,r.machine,r.type||'Extrusion Weld Test',rowsTest(r,1),rowsTest(r,2),rowsTest(r,3),r.result||yes(r.pass),gps(r).lat,gps(r).lng,r.comments]));sheet(wb,'AIR TEST',['DATE','SEAM','START TIME','START PSI','END TIME','END PSI','DROP','HOLD MIN','REQ START PSI','MAX DROP','PASS/FAIL','TESTER','GPS LAT','GPS LNG'],air.map(r=>[r.date,r.seam,r.sTime,r.sPsi,r.eTime,r.ePsi,(Number(r.sPsi)-Number(r.ePsi))||'',r.testMinutes||r.requiredHoldMin||5,r.requiredStartPsi||40,r.maxDropPsi||4,yes(r.pass),r.tester,gps(r).lat,gps(r).lng]));sheet(wb,'DESTRUCTIVE',['DATE','TIME','DT NUMBER','SEAM','LOCATION','WELDER','MACHINE','QC','TEST #1','TEST #2','TEST #3','TEST #4','TEST #5','RESULT','GPS LAT','GPS LNG','COMMENTS'],dt.map(r=>[r.date,r.time,r.dtNum,r.seam,r.loc,r.welder,r.machine,r.qc,rowsTest(r,1),rowsTest(r,2),rowsTest(r,3),rowsTest(r,4),rowsTest(r,5),r.result||yes(r.pass),gps(r).lat,gps(r).lng,r.comments]));sheet(wb,'REPAIRS VACUUM',['DATE','TIME','REPAIR NUMBER','LOCATION','TYPE','LEAKS','TESTER','PASS/FAIL','GPS LAT','GPS LNG','SOURCE','COMMENTS'],rep.map(r=>[r.dateRep||r.date,r.time,r.repNum,r.loc,r.type,r.leaks,r.tester,yes(r.pass),gps(r).lat,gps(r).lng,r.source,r.comments]));sheet(wb,'DRONE PHOTOS',['DATE','TIME','FILE NAME','LAT','LNG','ACCURACY','ALT','NOTES'],drone.map(r=>[r.date,r.time,r.name||r.fileName,gps(r).lat||r.lat,gps(r).lng||r.lng,gps(r).acc||r.acc,r.alt,r.notes]))}const dates=[...new Set([].concat(pan.map(r=>r.date),seam.map(r=>r.date),wedge.map(r=>r.date),extr.map(r=>r.date),air.map(r=>r.date),dt.map(r=>r.date),rep.map(r=>r.dateRep||r.date),drone.map(r=>r.date)).filter(Boolean))].sort();sheet(wb,'DAILY AS-BUILT',['DATE','PANELS','SQ FT','SEAMS','SEAM FT','WEDGE TESTS','EXTRUSION TESTS','AIR','DT','REPAIRS','DRONE','OPEN/FAILED'],dates.map(date=>{const failed=air.filter(r=>r.date===date&&r.pass===false).length+dt.filter(r=>r.date===date&&String(r.result||r.pass).toLowerCase().includes('fail')).length+rep.filter(r=>(r.dateRep||r.date)===date&&r.pass===false).length;return[date,pan.filter(r=>r.date===date).length,pan.filter(r=>r.date===date).reduce((n,r)=>n+(Number(r.area)||0),0),seam.filter(r=>r.date===date).length,seam.filter(r=>r.date===date).reduce((n,r)=>n+(Number(r.len)||0),0),wedge.filter(r=>r.date===date).length,extr.filter(r=>r.date===date).length,air.filter(r=>r.date===date).length,dt.filter(r=>r.date===date).length,rep.filter(r=>(r.dateRep||r.date)===date).length,drone.filter(r=>r.date===date).length,failed]}));const open=[];air.forEach(r=>{if(r.pass===false)open.push(['AIR',r.date,r.seam,'FAIL',`Start ${r.sPsi} End ${r.ePsi}`])});wedge.concat(extr).forEach(r=>{if(String(r.result||r.pass).toLowerCase().includes('fail'))open.push(['WELD TEST',r.date,r.type,'FAIL','Fix before production seam'])});dt.forEach(r=>{if(String(r.result||r.pass).toLowerCase().includes('fail'))open.push(['DT',r.date,r.dtNum,'FAIL',r.loc])});rep.forEach(r=>{if(r.pass===false)open.push(['REPAIR',r.dateRep||r.date,r.repNum,'FAIL',r.loc])});sheet(wb,'OPEN ITEMS',['TYPE','DATE','ID','STATUS','NOTE'],open);return wb}function cleanSummary(p){const c=counts(p),x=d(p),feet=(x.seams||[]).reduce((n,r)=>n+(Number(r.len)||0),0),dtDue=Math.floor(feet/500);return `<!doctype html><html><head><meta charset="utf-8"><title>LinerSync Office Summary</title><style>body{font-family:Arial,sans-serif;margin:24px;color:#111}h1{margin-bottom:4px}.box{border:1px solid #ddd;padding:10px;border-radius:8px;margin:8px 0}table{border-collapse:collapse;width:100%;margin-top:12px}td,th{border:1px solid #ddd;padding:8px;text-align:left}th{background:#f3f4f6}</style></head><body><h1>LinerSync Office Summary</h1><p><b>Project:</b> ${p.name||''}<br><b>Area:</b> ${p.area||''}<br><b>Material:</b> ${p.material||''}<br><b>Generated:</b> ${new Date().toLocaleString()}</p><div class="box"><b>DT Rule:</b> every 500 ft on wedge seam. Logged seam feet: ${feet}. DT due: ${dtDue}. DT saved: ${c.dt}.</div><table><tr><th>Panels</th><td>${c.panels}</td></tr><tr><th>Rolls</th><td>${c.rolls}</td></tr><tr><th>Seams</th><td>${c.seams}</td></tr><tr><th>Wedge weld tests</th><td>${c.wedge}</td></tr><tr><th>Extrusion weld tests</th><td>${c.extrusion}</td></tr><tr><th>Air tests</th><td>${c.air}</td></tr><tr><th>Destructive tests</th><td>${c.dt}</td></tr><tr><th>Repairs</th><td>${c.repairs}</td></tr><tr><th>Drone/photos</th><td>${c.drone}</td></tr></table><p>Mythos warnings do not block production. Exports are raw QC field data.</p></body></html>`}function exportWorkbook(onlyDaily=false){const p=cur();if(!p)return;const name=`${safe(p.name)}_${onlyDaily?'DAILY_ASBUILT':'FULL_CQA_WORKBOOK'}_${today()}.xlsx`;XLSX.writeFile(makeWorkbook(p,onlyDaily),name);msg('ok','Download started: '+name)}function exportSummary(){const p=cur();if(!p)return;const name=`${safe(p.name)}_OFFICE_SUMMARY_${today()}.html`;dl(name,cleanSummary(p),'text/html');msg('ok','Download started: '+name)}function exportJson(){const p=cur();if(!p)return;const name=`${safe(p.name)}_RAW_BACKUP_${today()}.json`;dl(name,JSON.stringify(p,null,2),'application/json');msg('ok','Download started: '+name)}function fullPackage(){exportWorkbook(false);setTimeout(()=>exportWorkbook(true),350);setTimeout(()=>exportSummary(),700);setTimeout(()=>exportJson(),1050);msg('ok','Full package downloads started: workbook, daily, clean summary, raw JSON.')}function msg(cls,t){$('last').className='notice '+cls;$('last').textContent=t}function render(){const p=cur();if(!p)return;const c=counts(p);$('counts').innerHTML=countCards(c);$('warning').className=c.total?'notice ok':'notice warn';$('warning').innerHTML=c.total?'<b>Export integration ready.</b><br>All modules feed this builder: QC logs, wedge/extrusion weld tests, DT, repair map, drone/photos, daily, raw backup.':'<b>No saved QC records yet.</b><br>Exports will still work but sheets will be blank.'}$('dateInput').value=today();$('projectSelect').onchange=render;$('fullBtn').onclick=fullPackage;$('workbookBtn').onclick=()=>exportWorkbook(false);$('dailyBtn').onclick=()=>exportWorkbook(true);$('summaryBtn').onclick=exportSummary;$('jsonBtn').onclick=exportJson;getProjects().then(r=>{projects=r||[];const s=$('projectSelect');s.innerHTML='';projects.forEach((p,i)=>{const o=document.createElement('option');o.value=i;o.textContent=(p.name||'Unnamed')+' — '+(p.area||'');s.appendChild(o)});$('status').textContent='Loaded '+projects.length+' project(s).';render()}).catch(e=>{$('status').textContent='Failed: '+e.message})</script></body></html>
