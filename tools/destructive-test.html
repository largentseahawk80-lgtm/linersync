<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>LinerSync Destructive Test</title><style>:root{--bg:#020617;--card:#0f172a;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--blue:#2563eb;--green:#16a34a;--gold:#ca8a04;--red:#dc2626;--purple:#7c3aed}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:820px;margin:0 auto;padding:14px 12px 110px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0}h1{font-size:25px;margin:0 0 6px}.sub{color:var(--muted);font-size:14px}label{display:block;margin-top:10px;color:#cbd5e1;font-size:12px;font-weight:950}select,input,textarea{width:100%;background:#111827;color:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;font-size:16px}textarea{min-height:70px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.btn{width:100%;border:0;border-radius:15px;padding:16px;margin:9px 0;font-weight:950;font-size:15px;color:#fff;background:var(--blue);text-align:center;text-decoration:none;display:block}.green{background:var(--green)}.red{background:var(--red)}.gold{background:var(--gold)}.gray{background:#334155}.purple{background:var(--purple)}.notice{background:#020617;border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0}.ok{border-color:var(--green);color:#bbf7d0}.warn{border-color:#f97316;color:#fed7aa}.strip{display:flex;gap:8px;overflow-x:auto;white-space:nowrap;padding:8px 0}.chip{flex:0 0 auto;border-radius:999px;padding:10px 13px;font-weight:950;font-size:12px;color:#fff;text-decoration:none}.box{background:#020617;border:1px solid #1e293b;border-radius:14px;padding:10px}.box strong{font-size:22px;display:block}.box span{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:950}.defaultBox{background:#061226;border:1px solid #1d4ed8;border-radius:14px;padding:10px;margin:9px 0;color:#bfdbfe;font-size:13px}.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(15,23,42,.96);border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.nav{border:0;border-radius:14px;padding:12px 4px;min-height:50px;color:#fff;font-weight:950;font-size:12px;text-decoration:none;text-align:center}@media(min-width:760px){.grid{grid-template-columns:repeat(4,1fr)}.bottom{left:50%;transform:translateX(-50%);max-width:720px;border-radius:18px 18px 0 0}}@media(max-width:430px){.wrap{padding:10px 10px 105px}.card{padding:12px}.grid{grid-template-columns:repeat(2,1fr)}h1{font-size:23px}}</style></head><body><main class="wrap"><section class="card"><h1>Destructive Test</h1><p class="sub">DT export rule: 5 samples. Date, time, project, material, and GPS save automatically.</p><div class="strip"><a class="chip gray" href="./capture-menu.html">← CAPTURE MENU</a><a class="chip gray" href="./field-capture.html">QC LOGS</a><a class="chip gold" href="./mythos-agent.html">MYTHOS</a><a class="chip red" href="./final-package.html">FINAL</a></div><div id="status">Loading projects...</div><div id="gpsBox" class="notice warn">GPS not locked yet.</div></section><section class="card"><label>Project</label><select id="projectSelect"></select><div id="projectDefaults" class="defaultBox">Defaults load here.</div><div id="counts"></div></section><section class="card"><h3>Add DT Record - 5 Samples</h3><div class="grid"><div><label>DT Number</label><input id="dtNum" placeholder="DT-1"></div><div><label>Seam Number</label><input id="seam" placeholder="Seam"></div><div><label>Location</label><input id="loc" placeholder="Sta / ft / GPS"></div><div><label>Welder</label><input id="welder"></div><div><label>Machine</label><input id="machine"></div><div><label>QC</label><input id="qc"></div><div><label>Result</label><select id="result"><option>PASS</option><option>FAIL</option></select></div></div><label>Test #1</label><input id="t1" placeholder="Peel / Shear"><label>Test #2</label><input id="t2"><label>Test #3</label><input id="t3"><label>Test #4</label><input id="t4"><label>Test #5</label><input id="t5"><label>Comments</label><textarea id="comments"></textarea><button class="btn green" id="saveBtn">SAVE DESTRUCTIVE TEST</button><div id="lastSave" class="notice">No DT saved yet.</div></section></main><nav class="bottom"><a class="nav blue" href="./capture-menu.html">CAPTURE</a><a class="nav gold" href="./mythos-agent.html">MYTHOS</a><a class="nav red" href="./final-package.html">FINAL</a><a class="nav green" href="./export-center.html">EXPORT</a></nav><script>const DBN='linersync-db',DBV=2,STORE='projects';let projects=[],gps=null;const $=id=>document.getElementById(id);const today=()=>new Date().toISOString().slice(0,10);function nowTime(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}function uid(){return Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7)}function v(id){return $(id).value.trim()}function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DBN,DBV);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:'id'})}})}function getProjects(){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly'),r=tx.objectStore(STORE).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error)}))}function saveProject(p){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite'),r=tx.objectStore(STORE).put(p);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)}))}function cur(){return projects[$('projectSelect').selectedIndex]||null}function data(p){p.data=p.data||{};['dTests','seams','panels','trialWelds'].forEach(k=>p.data[k]=p.data[k]||[]);return p.data}function g(){return gps?{lat:gps.lat,lng:gps.lng,acc:gps.acc,ts:new Date().toISOString()}:null}function render(){const p=cur();if(!p)return;const d=data(p);$('projectDefaults').textContent=`Project ${p.name||'—'} | Area ${p.area||'—'} | Material ${p.material||'—'} | DT requires 5 samples`;$('counts').innerHTML='<div class="grid">'+Object.entries({Panels:d.panels.length,Seams:d.seams.length,Welds:d.trialWelds.length,DT:d.dTests.length}).map(([k,val])=>`<div class="box"><strong>${val}</strong><span>${k}</span></div>`).join('')+'</div>'}async function reload(){projects=await getProjects();const s=$('projectSelect');s.innerHTML='';projects.forEach((p,i)=>{const o=document.createElement('option');o.value=i;o.textContent=(p.name||'Unnamed Project')+' — '+(p.area||'');s.appendChild(o)});$('status').textContent='Loaded '+projects.length+' project(s).';render()}async function ensureProject(){if(projects.length)return;const p={id:Date.now().toString(),name:'TEST',area:'',material:'60-mil HDPE Smooth',createdAt:new Date().toISOString(),data:{}};await saveProject(p);await reload()}async function saveDT(){const p=cur();if(!p)return;const d=data(p);const rec={id:uid(),date:today(),time:nowTime(),dtNum:v('dtNum'),seam:v('seam'),loc:v('loc'),welder:v('welder'),machine:v('machine'),qc:v('qc'),tests:[v('t1'),v('t2'),v('t3'),v('t4'),v('t5')],result:$('result').value,comments:v('comments'),material:p.material||'',gps:g(),source:'destructive-test'};d.dTests.push(rec);await saveProject(p);$('lastSave').className='notice ok';$('lastSave').innerHTML='<b>Saved:</b> '+(rec.dtNum||'DT record')+' '+rec.result;['dtNum','seam','loc','t1','t2','t3','t4','t5','comments'].forEach(x=>$(x).value='');render()}$('projectSelect').onchange=render;$('saveBtn').onclick=saveDT;if(navigator.geolocation){navigator.geolocation.getCurrentPosition(pos=>{gps={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:Math.round(pos.coords.accuracy)};$('gpsBox').className='notice ok';$('gpsBox').innerHTML='<b>GPS locked:</b> '+gps.lat.toFixed(6)+', '+gps.lng.toFixed(6)+' ±'+gps.acc+'m'},err=>{$('gpsBox').textContent='GPS not allowed yet: '+err.message},{enableHighAccuracy:true,timeout:10000,maximumAge:30000})}reload().then(ensureProject).catch(e=>$('status').textContent='Failed: '+e.message)</script></body></html>
