<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>LinerSync Repair Map</title><meta name="theme-color" content="#020617"><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""><style>:root{--bg:#020617;--card:#0f172a;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--blue:#2563eb;--green:#16a34a;--cyan:#0891b2;--orange:#f97316;--red:#dc2626}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif}.app{height:100dvh;display:grid;grid-template-rows:auto auto auto 1fr auto}.top{padding:8px;border-bottom:1px solid var(--line);background:#020617}.titleRow{display:flex;gap:8px;align-items:center;margin-bottom:6px}.title{font-size:18px;font-weight:950}.back{background:#334155;color:#fff;text-decoration:none;border-radius:999px;padding:9px 11px;font-size:12px;font-weight:950}select,input,button{width:100%;border-radius:13px;border:1px solid var(--line);min-height:42px;background:#111827;color:#fff;font-size:14px;font-weight:900;padding:8px}.row{display:grid;grid-template-columns:1fr 78px;gap:7px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:7px}.row3{display:grid;grid-template-columns:1fr 1fr 76px;gap:7px}.primary{background:var(--blue)}.good{background:var(--green)}.warn{background:var(--orange)}.danger{background:var(--red)}.cyan{background:var(--cyan)}.secondary{background:#111827;color:#cbd5e1}.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}.badge{padding:5px 8px;border-radius:999px;background:#111827;border:1px solid var(--line);font-size:10px;font-weight:900;color:#cbd5e1}.status{font-size:11px;color:var(--muted);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tabbar{display:grid;grid-template-columns:1fr 1fr 1fr;background:#0f172a;border-bottom:1px solid var(--line);padding:6px;gap:6px}.tab.active{background:var(--blue)}.panel{padding:6px;background:#020617}.card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:7px}.hidden{display:none}.view{position:relative;min-height:260px;background:#111827}#map{height:100%;width:100%;background:#111827;background-image:linear-gradient(rgba(148,163,184,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,.12) 1px,transparent 1px);background-size:48px 48px}.legend,.mapTools{position:absolute;z-index:600;background:rgba(2,6,23,.92);border:1px solid var(--line);border-radius:13px;padding:8px 9px;box-shadow:0 10px 28px rgba(0,0,0,.35)}.legend{left:8px;top:8px;max-width:58%}.mapTools{right:8px;top:8px;display:grid;gap:5px;width:92px}.mapTools button{min-height:32px;font-size:11px;padding:4px}.small{font-size:11px;color:var(--muted);line-height:1.25}.bottom{padding:7px;background:#020617;border-top:1px solid var(--line)}.footerBtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}.leaflet-container{background:#111827}.leaflet-tile{filter:none!important}@media(max-width:430px){.title{font-size:17px}.legend{max-width:54%}.row3{grid-template-columns:1fr 1fr 70px}.mapTools{width:82px}select,input,button{font-size:13px;min-height:40px}.footerBtns{grid-template-columns:1fr 1fr 70px}}@media(max-height:760px){.status{display:none}.legend .small:nth-child(n+4){display:none}}</style></head><body><div class="app"><div class="top"><div class="titleRow"><a class="back" href="./field-capture.html">← Capture</a><div class="title">Repair Map Mode</div></div><div class="row"><select id="projectSelect"></select><button id="gpsBtn" class="secondary">GPS</button></div><div class="badges"><div class="badge" id="projectBadge">Project</div><div class="badge" id="gpsBadge">GPS</div><div class="badge" id="stepBadge">Step</div><div class="badge" id="tileBadge">Map: loading</div></div><div class="status" id="statusText">Capture perimeter. Lock it. Then capture repairs.</div></div><div class="tabbar"><button class="tab active" id="tabPerimeter">Perimeter</button><button class="tab" id="tabRepairs">Repairs</button><button class="tab" id="tabEdit">Export</button></div><div class="panel" id="panelPerimeter"><div class="card"><div class="row3"><button id="capturePerimeterBtn" class="primary">Capture Point</button><button id="lockPerimeterBtn" class="good">Lock</button><button id="undoPerimeterBtn" class="warn">Undo</button></div></div></div><div class="panel hidden" id="panelRepairs"><div class="card"><div class="row2"><select id="repairType"><option>Patch</option><option>Burn Out</option><option>Extrusion Repair</option><option>Wrinkle Repair</option><option>Other</option></select><button id="captureRepairBtn" class="primary">Capture Repair</button></div><div class="row2" style="margin-top:7px"><input id="repairNote" placeholder="Optional note"><button id="undoRepairBtn" class="warn">Undo Repair</button></div></div></div><div class="panel hidden" id="panelEdit"><div class="card"><div class="row2"><button id="downloadCsvBtn" class="secondary">CSV</button><button id="downloadJsonBtn" class="secondary">JSON</button></div><div class="row2" style="margin-top:7px"><button id="clearRepairsBtn" class="danger">Clear Repairs</button><button id="clearProjectBtn" class="danger">Clear Map</button></div></div></div><div class="view"><div id="map"></div><div class="legend"><b>Repair workflow</b><div class="small">1 Capture perimeter</div><div class="small">2 Lock perimeter</div><div class="small">3 Capture repairs</div><div class="small" id="countsText">Perimeter: 0 | Repairs: 0</div></div><div class="mapTools"><button id="osmBtn" class="secondary">Street</button><button id="satBtn" class="secondary">Image</button><button id="reloadMapBtn" class="secondary">Reload</button></div></div><div class="bottom"><div class="footerBtns"><button id="recenterBtn" class="secondary">Center GPS</button><button id="syncBtn" class="cyan">Sync QC Repairs</button><button id="fitBtn" class="secondary">Fit</button></div></div></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script><script>const DBN='linersync-db',DBV=2,STORE='projects',MAP_KEY='linersync-repair-map-v1';let projects=[],currentProjectId=null,currentTab='perimeter',gps=null,map,gpsMarker,perimeterLayer,repairLayer,baseLayer,tileOK=0,tileERR=0;const $=x=>document.getElementById(x);function uid(){return Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8)}function today(){return new Date().toISOString().slice(0,10)}function time12(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}function setStatus(m){$('statusText').textContent=m}function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DBN,DBV);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:'id'})}})}function getProjects(){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly'),r=tx.objectStore(STORE).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error)}))}function saveProject(p){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite'),r=tx.objectStore(STORE).put(p);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)}))}function p(){return projects.find(x=>x.id===currentProjectId)||projects[0]||null}function data(pr){pr.data=pr.data||{};['vacuums','repairMap','dronePhotos'].forEach(k=>pr.data[k]=pr.data[k]||[]);return pr.data}function state(pr){const all=JSON.parse(localStorage.getItem(MAP_KEY)||'{}');return all[pr?.id]||{perimeterLocked:false,perimeterPoints:[],repairs:[]}}function saveState(pr,s){const all=JSON.parse(localStorage.getItem(MAP_KEY)||'{}');all[pr.id]=s;localStorage.setItem(MAP_KEY,JSON.stringify(all))}function refreshProjects(){const sel=$('projectSelect');sel.innerHTML='';projects.forEach(pr=>{const o=document.createElement('option');o.value=pr.id;o.textContent=pr.name||'Unnamed Project';if(pr.id===currentProjectId)o.selected=true;sel.appendChild(o)});updateUI()}function updateUI(){const pr=p();if(!pr)return;currentProjectId=pr.id;const s=state(pr);$('projectBadge').textContent='Project: '+(pr.name||'Unnamed');$('stepBadge').textContent='Step: '+(s.perimeterLocked?'repairs':'perimeter');$('countsText').textContent='Perimeter: '+s.perimeterPoints.length+' | Repairs: '+s.repairs.length;$('tabRepairs').disabled=!s.perimeterLocked;if(!s.perimeterLocked&&currentTab==='repairs')currentTab='perimeter';showTab(currentTab,false);renderMap()}function showTab(name,rerender=true){currentTab=name;['perimeter','repairs','edit'].forEach(t=>{$('panel'+t[0].toUpperCase()+t.slice(1)).classList.toggle('hidden',t!==name);$('tab'+t[0].toUpperCase()+t.slice(1)).classList.toggle('active',t===name)});if(rerender)setTimeout(()=>{map.invalidateSize(true);renderMap(false)},120)}function makePoint(extra){return Object.assign({id:uid(),lat:gps.lat,lng:gps.lng,accuracy:gps.accuracy,timestamp:Date.now(),date:today(),time:time12()},extra||{})}function capturePerimeter(){const pr=p();if(!pr)return alert('Choose project first.');if(!gps)return alert('GPS not ready.');const s=state(pr);if(s.perimeterLocked)return alert('Perimeter locked.');s.perimeterPoints.push(makePoint());saveState(pr,s);setStatus('Perimeter point '+s.perimeterPoints.length+' captured.');updateUI()}function lockPerimeter(){const pr=p();if(!pr)return;if(!gps)return alert('GPS not ready.');const s=state(pr);if(s.perimeterPoints.length<3)return alert('Need at least 3 perimeter points.');s.perimeterLocked=true;saveState(pr,s);currentTab='repairs';setStatus('Perimeter locked. Repairs active.');updateUI()}function undoPerimeter(){const pr=p();if(!pr)return;const s=state(pr);s.perimeterPoints.pop();if(s.perimeterPoints.length<3)s.perimeterLocked=false;saveState(pr,s);setStatus('Last perimeter point removed.');updateUI()}function captureRepair(){const pr=p();if(!pr)return alert('Choose project first.');if(!gps)return alert('GPS not ready.');const s=state(pr);if(!s.perimeterLocked){currentTab='perimeter';updateUI();return alert('Lock perimeter first.')}const repair=makePoint({repairType:$('repairType').value,note:($('repairNote').value||'').trim()});s.repairs.push(repair);saveState(pr,s);$('repairNote').value='';syncRepairToProject(pr,repair);setStatus(repair.repairType+' repair captured and synced.');updateUI()}function syncRepairToProject(pr,repair){const d=data(pr);if(d.vacuums.some(x=>x.id===repair.id))return;d.vacuums.push({id:repair.id,dateRep:today(),time:repair.time,repNum:'MAP-'+(d.vacuums.length+1),loc:'GPS '+repair.lat.toFixed(6)+', '+repair.lng.toFixed(6),type:repair.repairType||'Patch',leaks:1,tester:'',pass:true,comments:repair.note||'',gps:{lat:repair.lat,lng:repair.lng,acc:repair.accuracy,ts:new Date(repair.timestamp).toISOString()},source:'repair-map-mode'});saveProject(pr)}function syncAll(){const pr=p(),s=state(pr);let added=0;s.repairs.forEach(r=>{const before=data(pr).vacuums.length;syncRepairToProject(pr,r);if(data(pr).vacuums.length>before)added++});setStatus('Synced '+added+' repair(s) into QC repairs.')}function undoRepair(){const pr=p();if(!pr)return;const s=state(pr),last=s.repairs.pop();saveState(pr,s);if(last){const d=data(pr);d.vacuums=(d.vacuums||[]).filter(x=>x.id!==last.id);saveProject(pr)}setStatus('Last repair removed.');updateUI()}function clearRepairs(){const pr=p();if(!pr||!confirm('Clear repair map repairs?'))return;const s=state(pr);s.repairs=[];saveState(pr,s);setStatus('Repair map repairs cleared.');updateUI()}function clearProject(){const pr=p();if(!pr||!confirm('Clear perimeter and map repairs?'))return;saveState(pr,{perimeterLocked:false,perimeterPoints:[],repairs:[]});currentTab='perimeter';setStatus('Repair map cleared.');updateUI()}function csvEsc(v){const s=String(v==null?'':v);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s}function dl(name,content,mime){const b=new Blob([content],{type:mime}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}function safeName(v){return String(v||'project').replace(/[^a-z0-9-_]+/gi,'-').replace(/-+/g,'-')}function downloadCsv(){const pr=p(),s=state(pr);const rows=[['project','record_type','point_no','repair_type','note','latitude','longitude','accuracy_m','timestamp_iso','local_time']];s.perimeterPoints.forEach((x,i)=>rows.push([pr.name,'perimeter',i+1,'','',x.lat,x.lng,Math.round(x.accuracy||0),new Date(x.timestamp).toISOString(),new Date(x.timestamp).toLocaleString()]));s.repairs.forEach((x,i)=>rows.push([pr.name,'repair',i+1,x.repairType||'',x.note||'',x.lat,x.lng,Math.round(x.accuracy||0),new Date(x.timestamp).toISOString(),new Date(x.timestamp).toLocaleString()]));dl(safeName(pr.name)+'-repair-map.csv',rows.map(r=>r.map(csvEsc).join(',')).join('\n'),'text/csv')}function downloadJson(){const pr=p();dl(safeName(pr.name)+'-repair-map.json',JSON.stringify({project:pr.name,...state(pr)},null,2),'application/json')}function tileStatus(){const total=tileOK+tileERR;$('tileBadge').textContent=tileERR&&tileOK===0?'Map: no tiles':tileOK?'Map: tiles OK':'Map: loading'}function setBase(kind){tileOK=0;tileERR=0;tileStatus();if(baseLayer)map.removeLayer(baseLayer);const url=kind==='sat'?'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}':'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';baseLayer=L.tileLayer(url,{maxZoom:22,attribution:kind==='sat'?'Esri | Leaflet':'OpenStreetMap | Leaflet',crossOrigin:true});baseLayer.on('tileload',()=>{tileOK++;tileStatus()});baseLayer.on('tileerror',()=>{tileERR++;tileStatus();setStatus('Map tiles are not loading. GPS/points still work; tap Reload or Image/Street.')});baseLayer.addTo(map);setTimeout(()=>map.invalidateSize(true),250)}function initMap(){map=L.map('map',{zoomControl:true,preferCanvas:true});perimeterLayer=L.layerGroup().addTo(map);repairLayer=L.layerGroup().addTo(map);setBase('osm');map.setView([33.4484,-112.0740],18);setTimeout(()=>map.invalidateSize(true),250);window.addEventListener('resize',()=>setTimeout(()=>map.invalidateSize(true),120))}function renderMap(autoFit=true){if(!map)return;perimeterLayer.clearLayers();repairLayer.clearLayers();const pr=p();if(!pr)return;if(gps){if(!gpsMarker)gpsMarker=L.circleMarker([gps.lat,gps.lng],{radius:9,color:'#16a34a',fillColor:'#16a34a',fillOpacity:.35,weight:3}).addTo(map);else gpsMarker.setLatLng([gps.lat,gps.lng])}const s=state(pr),perim=s.perimeterPoints.map(x=>[x.lat,x.lng]),reps=s.repairs.map(x=>[x.lat,x.lng]);perim.forEach((ll,i)=>L.circleMarker(ll,{radius:6,color:'#ca8a04',fillColor:'#f97316',fillOpacity:.95,weight:2}).bindPopup('<b>Perimeter '+(i+1)+'</b>').addTo(perimeterLayer));if(perim.length>=2)L.polyline(perim,{color:'#2563eb',weight:4}).addTo(perimeterLayer);if(s.perimeterLocked&&perim.length>=3)L.polygon(perim,{color:'#2563eb',weight:3,fillColor:'#0891b2',fillOpacity:.18}).addTo(perimeterLayer);reps.forEach((ll,i)=>{const r=s.repairs[i];L.circleMarker(ll,{radius:8,color:r.repairType==='Burn Out'?'#dc2626':'#0891b2',fillColor:r.repairType==='Burn Out'?'#ef4444':'#06b6d4',fillOpacity:.95,weight:2}).bindPopup('<b>Repair '+(i+1)+'</b><br>'+(r.repairType||'')+(r.note?'<br>'+r.note:'')).addTo(repairLayer)});setTimeout(()=>map.invalidateSize(true),80);if(autoFit)fitMap()}function fitMap(){const pr=p();if(!pr)return;const s=state(pr),all=s.perimeterPoints.concat(s.repairs).map(x=>[x.lat,x.lng]);if(gps)all.push([gps.lat,gps.lng]);if(all.length>1)map.fitBounds(L.latLngBounds(all).pad(.18),{maxZoom:20});else if(all.length===1)map.setView(all[0],19)}function centerGps(){if(!gps)return alert('GPS not ready.');map.setView([gps.lat,gps.lng],19)}function reloadTiles(){if(baseLayer){baseLayer.redraw()}setTimeout(()=>{map.invalidateSize(true);renderMap(false)},150);setStatus('Map refreshed. If tiles stay dark, your network is blocking map tiles; points still save.')}function startGps(){if(!navigator.geolocation){$('gpsBadge').textContent='GPS: unsupported';return}navigator.geolocation.watchPosition(pos=>{gps={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy};$('gpsBadge').textContent='GPS: '+Math.round(gps.accuracy)+'m';renderMap(false)},err=>{$('gpsBadge').textContent='GPS: error';setStatus('Location blocked or unavailable.')},{enableHighAccuracy:true,maximumAge:1000,timeout:15000})}$('projectSelect').onchange=e=>{currentProjectId=e.target.value;setStatus('Project changed.');updateUI()};$('gpsBtn').onclick=centerGps;$('recenterBtn').onclick=centerGps;$('fitBtn').onclick=fitMap;$('syncBtn').onclick=syncAll;$('tabPerimeter').onclick=()=>showTab('perimeter');$('tabRepairs').onclick=()=>{if(p()&&state(p()).perimeterLocked)showTab('repairs')};$('tabEdit').onclick=()=>showTab('edit');$('capturePerimeterBtn').onclick=capturePerimeter;$('lockPerimeterBtn').onclick=lockPerimeter;$('undoPerimeterBtn').onclick=undoPerimeter;$('captureRepairBtn').onclick=captureRepair;$('undoRepairBtn').onclick=undoRepair;$('clearRepairsBtn').onclick=clearRepairs;$('clearProjectBtn').onclick=clearProject;$('downloadCsvBtn').onclick=downloadCsv;$('downloadJsonBtn').onclick=downloadJson;$('osmBtn').onclick=()=>setBase('osm');$('satBtn').onclick=()=>setBase('sat');$('reloadMapBtn').onclick=reloadTiles;initMap();getProjects().then(r=>{projects=r||[];if(!projects.length){const pr={id:uid(),name:'TEST',area:'',material:'',createdAt:new Date().toISOString(),data:{}};projects=[pr];return saveProject(pr)}}).then(()=>getProjects()).then(r=>{projects=r||projects;currentProjectId=projects[0]?.id;refreshProjects();startGps();setTimeout(reloadTiles,600)}).catch(e=>setStatus('Failed: '+e.message));</script></body></html>
