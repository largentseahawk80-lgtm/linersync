<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>LinerSync Repair Map</title><meta name="theme-color" content="#020617"><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""><style>:root{--bg:#020617;--card:#0f172a;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--blue:#2563eb;--green:#16a34a;--gold:#ca8a04;--red:#dc2626;--cyan:#0891b2;--orange:#f97316}*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}.app{height:100dvh;display:grid;grid-template-rows:auto auto auto 1fr auto;background:#020617}.top{padding:8px 10px 6px;border-bottom:1px solid var(--line)}.titleRow{display:flex;align-items:center;gap:8px;margin-bottom:6px}.title{font-size:18px;font-weight:950;line-height:1}.back{border-radius:999px;background:#334155;color:white;text-decoration:none;font-size:12px;font-weight:950;padding:9px 11px;white-space:nowrap}.row{display:grid;grid-template-columns:1fr 76px;gap:7px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:7px}.row3{display:grid;grid-template-columns:1fr 1fr 76px;gap:7px}input,select,button{width:100%;border-radius:13px;border:1px solid var(--line);min-height:44px;font-size:14px;font-weight:900}input,select{padding:9px;background:#111827;color:#fff}button{padding:8px;color:#fff}.primary{background:var(--blue)}.secondary{background:#111827;color:#cbd5e1}.good{background:var(--green)}.warn{background:var(--orange)}.danger{background:var(--red)}.cyan{background:var(--cyan)}.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}.badge{padding:5px 8px;border-radius:999px;background:#111827;border:1px solid var(--line);font-size:11px;font-weight:900;color:#cbd5e1}.status{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tabbar{display:grid;grid-template-columns:1fr 1fr 1fr;background:#0f172a;border-bottom:1px solid var(--line);padding:6px;gap:6px}.tab{background:#111827;color:#cbd5e1;min-height:40px}.tab.active{background:var(--blue);color:#fff}.panel{padding:7px;background:#020617}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:8px}.hidden{display:none}.view{position:relative;min-height:250px}#map{height:100%;width:100%;background:#111827}.legend{position:absolute;left:8px;top:8px;z-index:500;background:rgba(2,6,23,.90);border:1px solid var(--line);border-radius:14px;padding:8px 10px;box-shadow:0 10px 28px rgba(0,0,0,.35);max-width:70%;color:#e5e7eb}.small{font-size:11px;color:var(--muted);line-height:1.25}.bottom{padding:7px;background:#020617;border-top:1px solid var(--line)}.footerBtns{display:grid;grid-template-columns:1fr 1fr;gap:7px}@media(max-width:430px){.top{padding:7px 8px 5px}.title{font-size:17px}.row3{grid-template-columns:1fr 1fr 70px}input,select,button{min-height:42px;font-size:13px;border-radius:12px}.panel{padding:6px}.legend{max-width:62%;padding:7px 9px}.status{font-size:11px}.badge{font-size:10px;padding:5px 7px}}@media(max-height:760px){.titleRow{margin-bottom:4px}.badges{margin-top:4px}.status{display:none}.panel{padding:5px}input,select,button{min-height:39px}.tab{min-height:37px}.legend .small:nth-child(n+4){display:none}}</style></head><body><div class="app"><div class="top"><div class="titleRow"><a class="back" href="./field-capture.html">← Capture</a><div class="title">Repair Map Mode</div></div><div class="row"><select id="projectSelect"></select><button id="gpsBtn" class="secondary">GPS</button></div><div class="badges"><div class="badge" id="projectBadge">Project: none</div><div class="badge" id="gpsBadge">GPS: waiting</div><div class="badge" id="stepBadge">Step: perimeter</div></div><div class="status" id="statusText">Capture perimeter. Lock it. Then capture repairs.</div></div><div class="tabbar"><button class="tab active" id="tabPerimeter">Perimeter</button><button class="tab" id="tabRepairs">Repairs</button><button class="tab" id="tabEdit">Export</button></div><div class="panel" id="panelPerimeter"><div class="card"><div class="row3"><button id="capturePerimeterBtn" class="primary">Capture Point</button><button id="lockPerimeterBtn" class="good">Lock</button><button id="undoPerimeterBtn" class="warn">Undo</button></div></div></div><div class="panel hidden" id="panelRepairs"><div class="card"><div class="row2"><select id="repairType"><option value="Patch">Patch</option><option value="Burn Out">Burn Out</option><option value="Extrusion Repair">Extrusion Repair</option><option value="Wrinkle Repair">Wrinkle Repair</option><option value="Other">Other</option></select><button id="captureRepairBtn" class="primary">Capture Repair</button></div><div class="row2" style="margin-top:7px"><input id="repairNote" placeholder="Optional note"><button id="undoRepairBtn" class="warn">Undo Repair</button></div></div></div><div class="panel hidden" id="panelEdit"><div class="card"><div class="row2"><button id="downloadCsvBtn" class="secondary">CSV</button><button id="downloadJsonBtn" class="secondary">JSON</button></div><div class="row2" style="margin-top:7px"><button id="clearRepairsBtn" class="danger">Clear Repairs</button><button id="clearProjectBtn" class="danger">Clear Map</button></div></div></div><div class="view"><div id="map"></div><div class="legend"><div><b>Repair workflow</b></div><div class="small">1 Capture perimeter</div><div class="small">2 Lock perimeter</div><div class="small">3 Capture repairs</div><div class="small" id="countsText">Perimeter: 0 | Repairs: 0</div></div></div><div class="bottom"><div class="footerBtns"><button id="recenterBtn" class="secondary">Center GPS</button><button id="syncBtn" class="cyan">Sync QC Repairs</button></div></div></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script><script>const DBN='linersync-db',DBV=2,STORE='projects',MAP_KEY='linersync-repair-map-v1';let projects=[],currentProjectId=null,currentTab='perimeter',gps=null,map,gpsMarker,perimeterLayer,repairLayer;function id(x){return document.getElementById(x)}function uid(){return Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8)}function today(){return new Date().toISOString().slice(0,10)}function time12(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}function setStatus(m){id('statusText').textContent=m}function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DBN,DBV);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:'id'})}})}function getProjects(){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly'),r=tx.objectStore(STORE).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error)}))}function saveProject(p){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite'),r=tx.objectStore(STORE).put(p);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)}))}function p(){return projects.find(x=>x.id===currentProjectId)||projects[0]||null}function d(pr){pr.data=pr.data||{};['vacuums','repairMap','dronePhotos'].forEach(k=>pr.data[k]=pr.data[k]||[]);return pr.data}function loadMapState(pr){const all=JSON.parse(localStorage.getItem(MAP_KEY)||'{}');return all[pr?.id]||{perimeterLocked:false,perimeterPoints:[],repairs:[]}}function saveMapState(pr,s){const all=JSON.parse(localStorage.getItem(MAP_KEY)||'{}');all[pr.id]=s;localStorage.setItem(MAP_KEY,JSON.stringify(all))}function refreshProjects(){const sel=id('projectSelect');sel.innerHTML='';projects.forEach(pr=>{const o=document.createElement('option');o.value=pr.id;o.textContent=pr.name||'Unnamed Project';if(pr.id===currentProjectId)o.selected=true;sel.appendChild(o)});updateUi()}function updateUi(){const pr=p();if(!pr)return;currentProjectId=pr.id;const s=loadMapState(pr);id('projectBadge').textContent='Project: '+(pr.name||'Unnamed');id('stepBadge').textContent='Step: '+(s.perimeterLocked?'repairs':'perimeter');id('countsText').textContent='Perimeter: '+s.perimeterPoints.length+' | Repairs: '+s.repairs.length;id('tabRepairs').disabled=!s.perimeterLocked;if(!s.perimeterLocked&&currentTab==='repairs')currentTab='perimeter';showTab(currentTab);renderMap()}function showTab(name){currentTab=name;['perimeter','repairs','edit'].forEach(t=>{id('panel'+cap(t)).classList.toggle('hidden',t!==name);id('tab'+cap(t)).classList.toggle('active',t===name)})}function cap(s){return s.charAt(0).toUpperCase()+s.slice(1)}function makePoint(extra){return Object.assign({id:uid(),lat:gps.lat,lng:gps.lng,accuracy:gps.accuracy,timestamp:Date.now(),date:today(),time:time12()},extra||{})}function capturePerimeter(){const pr=p();if(!pr)return alert('Choose project first.');if(!gps)return alert('GPS not ready.');const s=loadMapState(pr);if(s.perimeterLocked)return alert('Perimeter locked.');s.perimeterPoints.push(makePoint());saveMapState(pr,s);setStatus('Perimeter point '+s.perimeterPoints.length+' captured.');updateUi()}function lockPerimeter(){const pr=p();if(!pr)return;if(!gps)return alert('GPS not ready.');const s=loadMapState(pr);if(s.perimeterPoints.length<3)return alert('Need at least 3 perimeter points.');s.perimeterLocked=true;saveMapState(pr,s);currentTab='repairs';setStatus('Perimeter locked. Repairs active.');updateUi()}function undoPerimeter(){const pr=p();if(!pr)return;const s=loadMapState(pr);s.perimeterPoints.pop();if(s.perimeterPoints.length<3)s.perimeterLocked=false;saveMapState(pr,s);setStatus('Last perimeter point removed.');updateUi()}function captureRepair(){const pr=p();if(!pr)return alert('Choose project first.');if(!gps)return alert('GPS not ready.');const s=loadMapState(pr);if(!s.perimeterLocked){currentTab='perimeter';updateUi();return alert('Lock perimeter first.')}const repair=makePoint({repairType:id('repairType').value,note:(id('repairNote').value||'').trim()});s.repairs.push(repair);saveMapState(pr,s);id('repairNote').value='';syncRepairToProject(pr,repair);setStatus(repair.repairType+' repair captured and synced.');updateUi()}function syncRepairToProject(pr,repair){const dd=d(pr);if(dd.vacuums.some(x=>x.id===repair.id))return;dd.vacuums.push({id:repair.id,dateRep:today(),time:repair.time,repNum:'MAP-'+(dd.vacuums.length+1),loc:'GPS '+repair.lat.toFixed(6)+', '+repair.lng.toFixed(6),type:repair.repairType||'Patch',leaks:1,tester:'',pass:true,comments:repair.note||'',gps:{lat:repair.lat,lng:repair.lng,acc:repair.accuracy,ts:new Date(repair.timestamp).toISOString()},source:'repair-map-mode'});saveProject(pr)}function syncAll(){const pr=p(),s=loadMapState(pr);if(!pr)return;let added=0;s.repairs.forEach(r=>{const before=d(pr).vacuums.length;syncRepairToProject(pr,r);if(d(pr).vacuums.length>before)added++});setStatus('Synced '+added+' repair(s) into QC repairs.')}function undoRepair(){const pr=p();if(!pr)return;const s=loadMapState(pr);const last=s.repairs.pop();saveMapState(pr,s);if(last){const dd=d(pr);dd.vacuums=(dd.vacuums||[]).filter(x=>x.id!==last.id);saveProject(pr)}setStatus('Last repair removed.');updateUi()}function clearRepairs(){const pr=p();if(!pr)return;if(!confirm('Clear repair map repairs?'))return;const s=loadMapState(pr);s.repairs=[];saveMapState(pr,s);setStatus('Repair map repairs cleared.');updateUi()}function clearProject(){const pr=p();if(!pr)return;if(!confirm('Clear perimeter and map repairs?'))return;saveMapState(pr,{perimeterLocked:false,perimeterPoints:[],repairs:[]});currentTab='perimeter';setStatus('Repair map cleared.');updateUi()}function csvEsc(v){const s=String(v==null?'':v);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s}function dl(name,content,mime){const b=new Blob([content],{type:mime}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}function safeName(v){return String(v||'project').replace(/[^a-z0-9-_]+/gi,'-').replace(/-+/g,'-')}function downloadCsv(){const pr=p();if(!pr)return;const s=loadMapState(pr);const rows=[['project','record_type','point_no','repair_type','note','latitude','longitude','accuracy_m','timestamp_iso','local_time']];s.perimeterPoints.forEach((x,i)=>rows.push([pr.name,'perimeter',i+1,'','',x.lat,x.lng,Math.round(x.accuracy||0),new Date(x.timestamp).toISOString(),new Date(x.timestamp).toLocaleString()]));s.repairs.forEach((x,i)=>rows.push([pr.name,'repair',i+1,x.repairType||'',x.note||'',x.lat,x.lng,Math.round(x.accuracy||0),new Date(x.timestamp).toISOString(),new Date(x.timestamp).toLocaleString()]));dl(safeName(pr.name)+'-repair-map.csv',rows.map(r=>r.map(csvEsc).join(',')).join('\n'),'text/csv')}function downloadJson(){const pr=p();if(!pr)return;dl(safeName(pr.name)+'-repair-map.json',JSON.stringify({project:pr.name,...loadMapState(pr)},null,2),'application/json')}function initMap(){map=L.map('map',{zoomControl:true});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:22,attribution:'&copy; OpenStreetMap'}).addTo(map);perimeterLayer=L.layerGroup().addTo(map);repairLayer=L.layerGroup().addTo(map);map.setView([33.4484,-112.0740],18)}function renderMap(){if(!map)return;perimeterLayer.clearLayers();repairLayer.clearLayers();if(gps){if(!gpsMarker){gpsMarker=L.circleMarker([gps.lat,gps.lng],{radius:9,color:'#16a34a',fillColor:'#16a34a',fillOpacity:.28,weight:3}).addTo(map)}else gpsMarker.setLatLng([gps.lat,gps.lng])}const pr=p();if(!pr)return;const s=loadMapState(pr),perim=s.perimeterPoints.map(x=>[x.lat,x.lng]),reps=s.repairs.map(x=>[x.lat,x.lng]);perim.forEach((ll,i)=>L.circleMarker(ll,{radius:6,color:'#ca8a04',fillColor:'#f97316',fillOpacity:.95,weight:2}).bindPopup('<b>Perimeter '+(i+1)+'</b>').addTo(perimeterLayer));if(perim.length>=2)L.polyline(perim,{color:'#2563eb',weight:4}).addTo(perimeterLayer);if(s.perimeterLocked&&perim.length>=3)L.polygon(perim,{color:'#2563eb',weight:3,fillColor:'#0891b2',fillOpacity:.18}).addTo(perimeterLayer);reps.forEach((ll,i)=>{const r=s.repairs[i];L.circleMarker(ll,{radius:7,color:r.repairType==='Burn Out'?'#dc2626':'#0891b2',fillColor:r.repairType==='Burn Out'?'#ef4444':'#06b6d4',fillOpacity:.95,weight:2}).bindPopup('<b>Repair '+(i+1)+'</b><br>'+(r.repairType||'')+(r.note?'<br>'+r.note:'')).addTo(repairLayer)});const all=perim.concat(reps);setTimeout(()=>map.invalidateSize(),100);if(all.length){const b=L.latLngBounds(all);if(gps)b.extend([gps.lat,gps.lng]);map.fitBounds(b.pad(.18),{maxZoom:20})}else if(gps)map.setView([gps.lat,gps.lng],19)}function centerGps(){if(!gps)return alert('GPS not ready.');map.setView([gps.lat,gps.lng],19)}function startGps(){if(!navigator.geolocation){id('gpsBadge').textContent='GPS: unsupported';return}navigator.geolocation.watchPosition(pos=>{gps={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy};id('gpsBadge').textContent='GPS: '+Math.round(gps.accuracy)+'m';renderMap()},err=>{id('gpsBadge').textContent='GPS: error';setStatus('Location blocked or unavailable.')},{enableHighAccuracy:true,maximumAge:1000,timeout:15000})}id('projectSelect').onchange=e=>{currentProjectId=e.target.value;setStatus('Project changed.');updateUi()};id('gpsBtn').onclick=centerGps;id('recenterBtn').onclick=centerGps;id('syncBtn').onclick=syncAll;id('tabPerimeter').onclick=()=>showTab('perimeter');id('tabRepairs').onclick=()=>{if(p()&&loadMapState(p()).perimeterLocked)showTab('repairs')};id('tabEdit').onclick=()=>showTab('edit');id('capturePerimeterBtn').onclick=capturePerimeter;id('lockPerimeterBtn').onclick=lockPerimeter;id('undoPerimeterBtn').onclick=undoPerimeter;id('captureRepairBtn').onclick=captureRepair;id('undoRepairBtn').onclick=undoRepair;id('clearRepairsBtn').onclick=clearRepairs;id('clearProjectBtn').onclick=clearProject;id('downloadCsvBtn').onclick=downloadCsv;id('downloadJsonBtn').onclick=downloadJson;initMap();getProjects().then(r=>{projects=r||[];if(!projects.length){const pr={id:uid(),name:'TEST',area:'',material:'',createdAt:new Date().toISOString(),data:{}};projects=[pr];return saveProject(pr)}}).then(()=>getProjects()).then(r=>{projects=r||projects;currentProjectId=projects[0]?.id;refreshProjects();startGps();updateUi()}).catch(e=>setStatus('Failed: '+e.message));</script></body></html>
