<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>LinerSync Drone As-Built</title><style>body{margin:0;background:#020617;color:#e5e7eb;font-family:system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:900px;margin:0 auto;padding:18px}.card{background:#0f172a;border:1px solid #1f2937;border-radius:18px;padding:16px;margin:12px 0}h1{margin:0 0 8px}.sub{color:#94a3b8}.btn{width:100%;border:0;border-radius:14px;padding:16px;margin:8px 0;font-weight:900;font-size:15px;color:#fff;background:#2563eb;text-align:center;text-decoration:none;display:block}.green{background:#16a34a}.gray{background:#334155}.orange{background:#f97316}.warn{border:1px solid #f97316;color:#fed7aa;background:#020617;border-radius:14px;padding:12px;margin:10px 0}.ok{border:1px solid #16a34a;color:#bbf7d0;background:#020617;border-radius:14px;padding:12px;margin:10px 0}select,input{width:100%;background:#111827;color:#fff;border:1px solid #334155;border-radius:12px;padding:14px;font-size:16px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}.box{background:#020617;border:1px solid #1e293b;border-radius:14px;padding:12px}.box strong{display:block;font-size:24px}.box span{font-size:11px;color:#94a3b8;text-transform:uppercase;font-weight:900}.list{background:#020617;border:1px solid #1e293b;border-radius:14px;padding:12px;margin-top:10px}.item{padding:8px;border-bottom:1px solid #1e293b}.item:last-child{border-bottom:0}.map{height:260px;background:#030712;border:1px solid #1e293b;border-radius:14px;position:relative;overflow:hidden}.dot{position:absolute;width:14px;height:14px;border-radius:999px;background:#22c55e;border:2px solid #bbf7d0;transform:translate(-50%,-50%)}.line{position:absolute;height:2px;background:#38bdf8;transform-origin:left center}.pill{display:inline-block;background:#111827;border:1px solid #334155;border-radius:999px;padding:6px 10px;margin:4px;font-size:12px;color:#cbd5e1}@media(min-width:700px){.grid{grid-template-columns:repeat(4,1fr)}}</style></head><body><main class="wrap"><section class="card"><h1>Drone As-Built Workflow</h1><p class="sub">Reads drone photo/map records already saved in LinerSync and prepares the as-built package layer.</p><a class="btn gray" href="./export-center.html">← BACK TO EXPORT CENTER</a><div id="status">Loading projects...</div></section><section class="card"><label>Project</label><select id="projectSelect"></select><div id="counts"></div><div id="message"></div><button class="btn green" id="exportCsv">EXPORT DRONE POINTS CSV</button><button class="btn orange" id="exportJson">EXPORT DRONE MAP JSON</button></section><section class="card"><h3>Map Preview</h3><div id="map" class="map"></div><div><span class="pill">DRONE PHOTO POINTS</span><span class="pill">GPS / EXIF</span><span class="pill">AS-BUILT MAP LAYER</span></div></section><section class="card"><h3>Drone / Map Records</h3><div id="details" class="list">No drone data loaded yet.</div></section></main><script>
const DBN='linersync-db',DBV=2,STORE='projects';let projects=[];const $=id=>document.getElementById(id);const today=()=>new Date().toISOString().slice(0,10);const safe=s=>String(s||'project').replace(/[^a-z0-9_-]+/gi,'_').replace(/^_+|_+$/g,'')||'project';function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DBN,DBV);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);r.onupgradeneeded=()=>{}})}function getProjects(){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const r=tx.objectStore(STORE).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error)}))}function cur(){return projects[$('projectSelect').selectedIndex]||null}function data(p){return p?.data||{}}function getDrone(p){const d=data(p);return d.dronePhotos||d.drone||d.mapPhotos||[]}function getPerim(p){const d=data(p);return d.perimeter||d.boundary||[]}function getRepairs(p){const d=data(p);return d.vacuums||d.repairs||[]}function gpsOf(x){return{lat:Number(x.lat??x.gps?.lat??x.latitude),lng:Number(x.lng??x.gps?.lng??x.longitude),acc:x.acc??x.gps?.acc??x.accuracy??''}}function hasGps(x){const g=gpsOf(x);return !Number.isNaN(g.lat)&&!Number.isNaN(g.lng)&&g.lat!==0&&g.lng!==0}function dl(blob,name){const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u)}function csvCell(v){return '"'+String(v??'').replace(/"/g,'""')+'"'}function cards(c){return '<div class="grid">'+Object.entries({'Drone Photos':c.photos,'GPS Points':c.gps,'Boundary Points':c.boundary,'Repairs':c.repairs}).map(([k,v])=>`<div class="box"><strong>${v}</strong><span>${k}</span></div>`).join('')+'</div>'}
function refresh(){const p=cur();if(!p){$('counts').innerHTML='No project found';return}const drone=getDrone(p),perim=getPerim(p),rep=getRepairs(p),gps=drone.filter(hasGps);$('counts').innerHTML=cards({photos:drone.length,gps:gps.length,boundary:perim.length,repairs:rep.length});$('message').className=gps.length?'ok':'warn';$('message').innerHTML=gps.length?'<b>Drone GPS data found.</b><br>Ready to export drone map layer.':'<b>No drone GPS points found yet.</b><br>Import drone photos in the main app first so EXIF GPS can be used for the as-built map.';renderList(drone,perim,rep);renderMap(gps,perim)}
function renderList(drone,perim,rep){const rows=[];rows.push(`<div class="item"><b>Drone photos:</b> ${drone.length}</div>`);drone.forEach((x,i)=>{const g=gpsOf(x);rows.push(`<div class="item">${i+1}. ${x.name||x.fileName||'photo'} ${hasGps(x)?g.lat.toFixed(6)+', '+g.lng.toFixed(6):'NO GPS'} ${x.date||''}</div>`)});rows.push(`<div class="item"><b>Boundary points:</b> ${perim.length}</div>`);rows.push(`<div class="item"><b>Repair records available for overlay:</b> ${rep.length}</div>`);$('details').innerHTML=rows.join('')}
function renderMap(points,perim){const m=$('map');m.innerHTML='';const pts=points.map(gpsOf).concat((perim||[]).map(gpsOf).filter(g=>!Number.isNaN(g.lat)&&!Number.isNaN(g.lng)));if(!pts.length){m.innerHTML='<div style="padding:18px;color:#94a3b8">No GPS points to preview yet.</div>';return}const minLat=Math.min(...pts.map(p=>p.lat)),maxLat=Math.max(...pts.map(p=>p.lat)),minLng=Math.min(...pts.map(p=>p.lng)),maxLng=Math.max(...pts.map(p=>p.lng));const xy=p=>{const x=((p.lng-minLng)/((maxLng-minLng)||1))*80+10;const y=(100-(((p.lat-minLat)/((maxLat-minLat)||1))*80+10));return{x,y}};points.forEach(x=>{const p=xy(gpsOf(x)),d=document.createElement('div');d.className='dot';d.style.left=p.x+'%';d.style.top=p.y+'%';m.appendChild(d)});}
function exportCsv(){const p=cur();if(!p)return;const drone=getDrone(p);const rows=[['file','date','lat','lng','accuracy','notes'],...drone.map(x=>{const g=gpsOf(x);return[x.name||x.fileName||'',x.date||'',Number.isNaN(g.lat)?'':g.lat,Number.isNaN(g.lng)?'':g.lng,g.acc,x.notes||'']})];dl(new Blob(['\ufeff'+rows.map(r=>r.map(csvCell).join(',')).join('\n')],{type:'text/csv'}),safe(p.name)+'_Drone_Points_'+today()+'.csv');$('message').className='ok';$('message').innerHTML='<b>Download started:</b><br>Drone points CSV'}
function exportJson(){const p=cur();if(!p)return;const payload={project:p.name||'',area:p.area||'',material:p.material||'',exportedAt:new Date().toISOString(),dronePhotos:getDrone(p),boundary:getPerim(p),repairs:getRepairs(p)};dl(new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}),safe(p.name)+'_Drone_AsBuilt_Map_'+today()+'.json');$('message').className='ok';$('message').innerHTML='<b>Download started:</b><br>Drone map JSON'}
$('projectSelect').addEventListener('change',refresh);$('exportCsv').addEventListener('click',exportCsv);$('exportJson').addEventListener('click',exportJson);getProjects().then(r=>{projects=r||[];const s=$('projectSelect');s.innerHTML='';projects.forEach((p,i)=>{const o=document.createElement('option');o.value=i;o.textContent=(p.name||'Unnamed Project')+' — '+(p.area||'');s.appendChild(o)});$('status').textContent='Loaded '+projects.length+' project(s).';refresh()}).catch(e=>{$('status').textContent='Failed to read IndexedDB: '+e.message})
</script></body></html>
