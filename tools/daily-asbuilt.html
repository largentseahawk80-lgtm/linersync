<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>LinerSync Daily As-Built</title><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script><style>body{margin:0;background:#020617;color:#e5e7eb;font-family:system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:900px;margin:0 auto;padding:18px}.card{background:#0f172a;border:1px solid #1f2937;border-radius:18px;padding:16px;margin:12px 0}h1{margin:0 0 8px}.sub{color:#94a3b8}.btn{width:100%;border:0;border-radius:14px;padding:16px;margin:8px 0;font-weight:900;font-size:15px;color:#fff;background:#2563eb;text-align:center;text-decoration:none;display:block}.green{background:#16a34a}.gray{background:#334155}.warn{border:1px solid #f97316;color:#fed7aa;background:#020617;border-radius:14px;padding:12px;margin:10px 0}.ok{border:1px solid #16a34a;color:#bbf7d0;background:#020617;border-radius:14px;padding:12px;margin:10px 0}select,input{width:100%;background:#111827;color:#fff;border:1px solid #334155;border-radius:12px;padding:14px;font-size:16px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}.box{background:#020617;border:1px solid #1e293b;border-radius:14px;padding:12px}.box strong{display:block;font-size:24px}.box span{font-size:11px;color:#94a3b8;text-transform:uppercase;font-weight:900}.list{background:#020617;border:1px solid #1e293b;border-radius:14px;padding:12px;margin-top:10px}.item{padding:8px;border-bottom:1px solid #1e293b}.item:last-child{border-bottom:0}.bad{color:#fecaca}@media(min-width:700px){.grid{grid-template-columns:repeat(4,1fr)}}</style></head><body><main class="wrap"><section class="card"><h1>Daily As-Built Builder</h1><p class="sub">Builds a daily summary from saved project logs.</p><a class="btn gray" href="./export-center.html">← BACK TO EXPORT CENTER</a><div id="status">Loading projects...</div></section><section class="card"><label>Project</label><select id="projectSelect"></select><label>Report Date</label><input id="dateInput" type="date"><div id="counts"></div><div id="message"></div><button class="btn green" id="exportBtn">EXPORT DAILY AS-BUILT XLSX</button></section><section class="card"><h3>Daily Details</h3><div id="details" class="list">No daily data loaded yet.</div></section></main><script>
const DBN='linersync-db',DBV=2,STORE='projects';let projects=[];const $=id=>document.getElementById(id);const today=()=>new Date().toISOString().slice(0,10);const safe=s=>String(s||'project').replace(/[^a-z0-9_-]+/gi,'_').replace(/^_+|_+$/g,'')||'project';
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DBN,DBV);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);r.onupgradeneeded=()=>{}})}function getProjects(){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const r=tx.objectStore(STORE).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error)}))}function cur(){return projects[$('projectSelect').selectedIndex]||null}function data(p){return p?.data||{}}function isDate(x,d){return String(x||'').slice(0,10)===d}
function rowsFor(p,date){const d=data(p);const panels=(d.panels||[]).filter(x=>isDate(x.date,date));const seams=(d.seams||[]).filter(x=>isDate(x.date,date));const air=(d.airTests||[]).filter(x=>isDate(x.date,date));const dt=(d.dTests||[]).filter(x=>isDate(x.date,date));const vac=(d.vacuums||[]).filter(x=>isDate(x.dateRep||x.date,date));const drone=(d.dronePhotos||[]).filter(x=>isDate(x.date,date));const failed=[];air.forEach(x=>{if(x.pass===false)failed.push(['AIR TEST',x.seam||'',`Start ${x.sPsi||''} End ${x.ePsi||''}`])});dt.forEach(x=>{if(String(x.pass||x.result||'').toLowerCase().includes('fail'))failed.push(['DESTRUCTIVE',x.dtNum||x.seam||'',x.loc||''])});vac.forEach(x=>{if(x.pass===false)failed.push(['VACUUM',x.repNum||'',x.loc||''])});return{panels,seams,air,dt,vac,drone,failed}}
function totalFt(a){return a.reduce((n,x)=>n+(Number(x.len)||0),0)}function totalSf(a){return a.reduce((n,x)=>n+(Number(x.area)||0),0)}function counts(r){return{panels:r.panels.length,sqft:totalSf(r.panels),seams:r.seams.length,ft:totalFt(r.seams),air:r.air.length,dt:r.dt.length,repairs:r.vac.length,failed:r.failed.length,drone:r.drone.length}}
function cards(c){return '<div class="grid">'+Object.entries({Panels:c.panels,'Sq Ft':c.sqft,Seams:c.seams,'Ft Welded':c.ft,Air:c.air,DT:c.dt,Repairs:c.repairs,Failed:c.failed}).map(([k,v])=>`<div class="box"><strong>${v}</strong><span>${k}</span></div>`).join('')+'</div>'}
function detailHtml(r){const parts=[];function add(title,arr,fn){parts.push(`<h4>${title} (${arr.length})</h4>`);if(!arr.length)parts.push('<div class="item">None</div>');arr.forEach(x=>parts.push(`<div class="item">${fn(x)}</div>`))}add('Panels placed',r.panels,x=>`Panel ${x.num||''} Roll ${x.roll||''} ${x.w||''} x ${x.l||''} = ${x.area||''} sf`);add('Seams welded',r.seams,x=>`Seam ${x.num||''} ${x.len||''} ft Machine ${x.machine||''}`);add('Air tests',r.air,x=>`Seam ${x.seam||''} ${x.sPsi||''} to ${x.ePsi||''} ${x.pass===false?'FAIL':'PASS/OPEN'}`);add('Destructive tests',r.dt,x=>`DT ${x.dtNum||''} Seam ${x.seam||''} ${x.result||x.pass||''}`);add('Vacuum repairs',r.vac,x=>`Repair ${x.repNum||''} ${x.type||''} ${x.loc||''}`);add('Drone photos',r.drone,x=>`${x.name||x.fileName||'photo'} ${x.lat||x.gps?.lat||''}, ${x.lng||x.gps?.lng||''}`);if(r.failed.length){parts.push('<h4 class="bad">Failed / Open items</h4>');r.failed.forEach(x=>parts.push(`<div class="item bad">${x[0]} ${x[1]} ${x[2]}</div>`))}return parts.join('')}
function refresh(){const p=cur(),date=$('dateInput').value||today();if(!p){$('counts').innerHTML='No project found';return}const r=rowsFor(p,date),c=counts(r);$('counts').innerHTML=cards(c);$('details').innerHTML=detailHtml(r);$('message').className=c.panels+c.seams+c.air+c.dt+c.repairs+c.drone===0?'warn':'ok';$('message').innerHTML=c.panels+c.seams+c.air+c.dt+c.repairs+c.drone===0?'<b>No saved records for this date.</b><br>Export will show a blank daily as-built for the selected date.':'<b>Daily records found.</b><br>Ready to export daily as-built.'}
function sheet(wb,n,h,r){const ws=XLSX.utils.aoa_to_sheet([h,...r]);ws['!cols']=h.map(x=>({wch:Math.max(14,String(x).length+2)}));XLSX.utils.book_append_sheet(wb,ws,n.slice(0,31))}
function exportDaily(){try{const p=cur(),date=$('dateInput').value||today();if(!p)return alert('No project selected');const r=rowsFor(p,date),c=counts(r),wb=XLSX.utils.book_new();sheet(wb,'DAILY AS-BUILT',['FIELD','VALUE'],[['Project',p.name||''],['Area',p.area||''],['Material',p.material||''],['Report Date',date],['Panels Placed',c.panels],['Sq Ft Placed',c.sqft],['Seams Welded',c.seams],['Ft Welded',c.ft],['Air Tests',c.air],['Destructive Tests',c.dt],['Vacuum Repairs',c.repairs],['Drone Photos',c.drone],['Failed/Open Items',c.failed]]);sheet(wb,'PANELS',['DATE','PANEL','ROLL','WIDTH','LENGTH','SQ FT','ZONE'],r.panels.map(x=>[x.date,x.num,x.roll,x.w,x.l,x.area,x.zone]));sheet(wb,'SEAMS',['DATE','TIME','SEAM','SEAMER','MACHINE','TEMP','SPEED','LENGTH'],r.seams.map(x=>[x.date,x.time,x.num,x.seamer,x.machine,x.temp,x.speed,x.len]));sheet(wb,'AIR TESTS',['DATE','SEAM','START PSI','END PSI','PASS/FAIL','TESTER'],r.air.map(x=>[x.date,x.seam,x.sPsi,x.ePsi,x.pass===false?'FAIL':'PASS/OPEN',x.tester]));sheet(wb,'DESTRUCTIVE',['DATE','DT','SEAM','LOCATION','RESULT'],r.dt.map(x=>[x.date,x.dtNum,x.seam,x.loc,x.result||x.pass]));sheet(wb,'VACUUM',['DATE','REPAIR','LOCATION','TYPE','BY','PASS/FAIL'],r.vac.map(x=>[x.dateRep||x.date,x.repNum,x.loc,x.type,x.by,x.pass===false?'FAIL':'PASS/OPEN']));sheet(wb,'FAILED OPEN',['TYPE','ID','NOTE'],r.failed);const name=`${safe(p.name)}_Daily_AsBuilt_${date}.xlsx`;XLSX.writeFile(wb,name);$('message').className='ok';$('message').innerHTML='<b>Download started:</b><br>'+name}catch(e){$('message').className='warn';$('message').innerHTML='<b>Export failed:</b><br>'+e.message}}
$('dateInput').value=today();$('projectSelect').addEventListener('change',refresh);$('dateInput').addEventListener('change',refresh);$('exportBtn').addEventListener('click',exportDaily);getProjects().then(r=>{projects=r||[];const s=$('projectSelect');s.innerHTML='';projects.forEach((p,i)=>{const o=document.createElement('option');o.value=i;o.textContent=(p.name||'Unnamed Project')+' — '+(p.area||'');s.appendChild(o)});$('status').textContent='Loaded '+projects.length+' project(s).';refresh()}).catch(e=>{$('status').textContent='Failed to read IndexedDB: '+e.message})
</script></body></html>
