<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Create Project</title><style>body{margin:0;background:#020617;color:#e5e7eb;font-family:system-ui,Segoe UI,sans-serif}.wrap{max-width:760px;margin:auto;padding:14px 12px 130px}.card{background:#0f172a;border:1px solid #334155;border-radius:18px;padding:14px;margin:10px 0}h1{margin:0 0 8px;font-size:26px}.sub{color:#94a3b8}label{display:block;margin-top:10px;font-size:12px;font-weight:900;color:#cbd5e1}input,select,textarea{width:100%;box-sizing:border-box;background:#111827;color:white;border:1px solid #334155;border-radius:13px;padding:13px;font-size:16px}textarea{min-height:70px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btn{width:100%;border:0;border-radius:15px;padding:18px;margin:10px 0;font-weight:950;font-size:16px;color:white}.green{background:#16a34a}.blue{background:#2563eb}.gold{background:#ca8a04}.red{background:#dc2626}.gray{background:#334155}.notice{background:#020617;border:1px solid #334155;border-radius:14px;padding:12px;margin:10px 0}.ok{border-color:#16a34a;color:#bbf7d0}.warn{border-color:#f97316;color:#fed7aa}.bad{border-color:#dc2626;color:#fecaca}.bottom{position:fixed;left:0;right:0;bottom:0;background:#0f172a;border-top:1px solid #334155;padding:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.nav{border-radius:14px;padding:14px 4px;color:white;text-decoration:none;text-align:center;font-weight:950;font-size:12px}@media(min-width:760px){.grid{grid-template-columns:repeat(4,1fr)}.bottom{left:50%;transform:translateX(-50%);max-width:720px;border-radius:18px 18px 0 0}}</style></head><body><main class="wrap"><section class="card"><h1>Create Project</h1><p class="sub">Emergency clean project creator. No loading lock. Creates the job and sends you to QC Logs.</p><div id="msg" class="notice warn">Ready.</div></section><section class="card"><div class="grid"><div><label>Project Name</label><input id="name" placeholder="CLAYTON"></div><div><label>Area / Cell / Pond</label><input id="area" placeholder="LAGOON3"></div><div><label>Material</label><select id="material"><option>60-mil HDPE Smooth</option><option>60-mil HDPE Textured</option><option>80-mil HDPE Smooth</option><option>80-mil HDPE Textured</option><option>40-mil LLDPE Smooth</option><option>40-mil LLDPE Textured</option><option>Other</option></select></div><div><label>Thickness</label><select id="thickness"><option>60 mil</option><option>80 mil</option><option>40 mil</option><option>Other</option></select></div><div><label>Width ft</label><input id="width" value="23" type="number"></div><div><label>Active Roll</label><input id="roll" placeholder="1234"></div><div><label>Air Start PSI</label><input id="airStart" value="40" type="number"></div><div><label>Air Hold Min</label><input id="airHold" value="5" type="number"></div><div><label>Air Max Drop</label><input id="airDrop" value="4" type="number"></div></div><label>Notes</label><textarea id="notes" placeholder="Optional"></textarea><button class="btn green" id="save">CREATE PROJECT</button><button class="btn blue" id="saveOpen">CREATE + OPEN QC LOGS</button><button class="btn gray" id="clearLock">UNLOCK / RESET STORAGE</button></section><section class="card"><h3>Existing Projects</h3><div id="list" class="notice">Not loaded yet.</div></section></main><nav class="bottom"><a class="nav blue" href="./capture-menu.html">CAPTURE</a><a class="nav gold" href="./mythos-agent.html">MYTHOS</a><a class="nav red" href="./final-package.html">FINAL</a><a class="nav green" href="./export-center.html">EXPORT</a></nav><script>var DB='linersync-db',STORE='projects';function q(id){return document.getElementById(id)}function v(id){return (q(id).value||'').trim()}function n(id,d){var x=Number(v(id));return isFinite(x)&&x>0?x:d}function msg(c,t){q('msg').className='notice '+c;q('msg').innerHTML=t}function id(){return Date.now()+'-'+Math.random().toString(36).slice(2,7)}function esc(s){return String(s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}function open(){return new Promise(function(res,rej){var r=indexedDB.open(DB,Date.now());r.onupgradeneeded=function(e){var db=e.target.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:'id'})};r.onsuccess=function(){res(r.result)};r.onerror=function(){rej(r.error)}})}function save(p){return open().then(function(db){return new Promise(function(res,rej){var tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(p);tx.oncomplete=function(){db.close();res()};tx.onerror=function(){rej(tx.error)}})})}function all(){return open().then(function(db){return new Promise(function(res,rej){var tx=db.transaction(STORE,'readonly'),r=tx.objectStore(STORE).getAll();r.onsuccess=function(){db.close();res(r.result||[])};r.onerror=function(){rej(r.error)}})})}function active(pid){localStorage.setItem('linersync-active-project-id',pid);localStorage.setItem('linersync-current-project-id',pid)}function project(){var mat=v('material')||'60-mil HDPE Smooth',pid=id(),name=v('name')||('FIELD PROJECT '+new Date().toLocaleString());return{id:pid,name:name,area:v('area'),material:mat,notes:v('notes'),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),data:{activeThickness:v('thickness')||'60 mil',activeWidth:v('width')||'23',activeRoll:v('roll'),activeType:mat,airStartPsi:n('airStart',40),airHoldMin:n('airHold',5),airMaxDropPsi:n('airDrop',4),panels:[],rolls:[],seams:[],trialWelds:[],extWelds:[],airTests:[],dTests:[],vacuums:[],dronePhotos:[]}}}function render(){all().then(function(list){q('list').innerHTML=list.length?list.map(function(p){return '<div style="padding:10px;border-bottom:1px solid #334155"><b>'+esc(p.name)+'</b><br><span style="color:#94a3b8">'+esc(p.area)+' | '+esc(p.material)+'</span></div>'}).join(''):'No projects yet.'}).catch(function(e){q('list').innerHTML='Could not load: '+esc(e.message||e)})}function create(openAfter){msg('warn','Creating...');var p=project();save(p).then(function(){active(p.id);msg('ok','<b>Created:</b> '+esc(p.name)+'<br>Active project set.');render();if(openAfter)setTimeout(function(){location.href='./field-capture.html#header'},300)}).catch(function(e){msg('bad','Create failed: '+esc(e.message||e))})}q('save').onclick=function(){create(false)};q('saveOpen').onclick=function(){create(true)};q('clearLock').onclick=function(){indexedDB.deleteDatabase(DB);msg('warn','Storage reset. Refresh this page, then create project.')} ;render();</script></body></html>
