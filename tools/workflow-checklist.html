<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>LinerSync Workflow Checklist</title><style>:root{--bg:#020617;--card:#0f172a;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--blue:#2563eb;--green:#16a34a;--gold:#ca8a04;--red:#dc2626;--cyan:#0891b2;--orange:#f97316;--purple:#7c3aed}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:880px;margin:0 auto;padding:14px 12px 112px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0}h1{font-size:25px;margin:0 0 6px}.sub,.small{color:var(--muted);font-size:13px}.strip{display:flex;gap:8px;overflow-x:auto;white-space:nowrap;padding:8px 0}.chip{flex:0 0 auto;border-radius:999px;padding:10px 13px;font-weight:950;font-size:12px;color:#fff;text-decoration:none}.gray{background:#334155}.gold{background:var(--gold)}.red{background:var(--red)}.green{background:var(--green)}.cyan{background:var(--cyan)}.blue{background:var(--blue)}.orange{background:var(--orange)}.purple{background:var(--purple)}select,input{width:100%;background:#111827;color:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;font-size:16px}label{display:block;margin-top:10px;font-size:12px;font-weight:950;color:#cbd5e1}.notice{background:#020617;border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0}.ok{border-color:var(--green);color:#bbf7d0}.warn{border-color:var(--orange);color:#fed7aa}.bad{border-color:var(--red);color:#fecaca}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.box{background:#020617;border:1px solid #1e293b;border-radius:14px;padding:10px}.box strong{display:block;font-size:24px}.box span{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:950}.step{display:grid;grid-template-columns:42px 1fr auto;gap:10px;align-items:center;background:#020617;border:1px solid #1e293b;border-radius:15px;padding:12px;margin:9px 0;text-decoration:none;color:#e5e7eb}.step.next{border-color:#ca8a04;background:rgba(202,138,4,.12)}.step.done{border-color:#16a34a}.step.warn{border-color:#f97316}.step.wait{opacity:.72}.num{width:34px;height:34px;border-radius:999px;display:grid;place-items:center;font-weight:950;background:#334155;color:#fff}.done .num{background:#16a34a}.next .num{background:#ca8a04}.warn .num{background:#f97316}.title{font-weight:950}.tag{font-size:11px;font-weight:950;border:1px solid #334155;border-radius:999px;padding:6px 9px;color:#cbd5e1;white-space:nowrap}.done .tag{border-color:#16a34a;color:#bbf7d0}.next .tag,.warn .tag{border-color:#f97316;color:#fed7aa}.footer{position:fixed;left:0;right:0;bottom:0;background:rgba(15,23,42,.96);border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.nav{border-radius:14px;padding:12px 4px;min-height:50px;color:#fff;font-weight:950;font-size:12px;text-decoration:none;text-align:center}@media(min-width:760px){.grid{grid-template-columns:repeat(4,1fr)}.footer{left:50%;transform:translateX(-50%);max-width:720px;border-radius:18px 18px 0 0}}@media(max-width:430px){.wrap{padding:10px 10px 108px}.card{padding:12px}.step{grid-template-columns:38px 1fr}.tag{grid-column:2/3;width:max-content}.title{font-size:15px}}</style></head><body><main class="wrap"><section class="card"><h1>Workflow Checklist</h1><p class="sub">Field cockpit: do the next correct thing, in the right production order.</p><div class="strip"><a class="chip gray" href="./capture-menu.html">← CAPTURE</a><a class="chip blue" href="./field-capture.html">QC LOGS</a><a class="chip gold" href="./mythos-agent.html">MYTHOS</a><a class="chip green" href="./office-package-builder.html">OFFICE PACKAGE</a></div><div id="status">Loading projects...</div></section><section class="card"><label>Project</label><select id="projectSelect"></select><div id="summary"></div><div id="nextBox" class="notice">Next action loads here.</div></section><section class="card"><h3>Production Order</h3><div id="steps"></div></section></main><nav class="footer"><a class="nav blue" href="./capture-menu.html">CAPTURE</a><a class="nav gold" href="./mythos-agent.html">MYTHOS</a><a class="nav red" href="./final-package.html">FINAL</a><a class="nav green" href="./export-center.html">EXPORT</a></nav><script>const DBN='linersync-db',DBV=2,STORE='projects';let projects=[];const $=id=>document.getElementById(id);function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DBN,DBV);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);r.onupgradeneeded=()=>{}})}function getProjects(){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly'),r=tx.objectStore(STORE).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error)}))}function cur(){return projects[$('projectSelect').selectedIndex]||null}function d(p){return p?.data||{}}function a(v){return Array.isArray(v)?v:[]}function seamFeet(seams){return a(seams).reduce((sum,s)=>sum+(Number(s.len??s.length??s.feet??0)||0),0)}function dtDue(feet){return Math.floor(Number(feet||0)/500)}function bad(x){return x?.pass===false||String(x?.result||'').toLowerCase().includes('fail')}function okProject(p){return !!(p?.name&&p?.area&&p?.material)}function okRoll(x){return !!(a(x.rolls).length||x.activeRoll)}function state(p){const x=d(p),pan=a(x.panels),seams=a(x.seams),wedge=a(x.trialWelds),extr=a(x.extWelds),weld=wedge.concat(extr),air=a(x.airTests),dt=a(x.dTests),rep=a(x.vacuums),drone=a(x.dronePhotos),feet=seamFeet(seams),due=dtDue(feet);return{x,pan,seams,wedge,extr,weld,air,dt,rep,drone,feet,due,missingDT:Math.max(0,due-dt.length),fails:air.filter(bad).length+weld.filter(bad).length+dt.filter(bad).length+rep.filter(bad).length}}function statusFor(p){const s=state(p),steps=[];steps.push({n:1,title:'Project / Defaults',detail:'Project, area/cell, material, width, active roll, air rule.',href:'./field-capture.html#header',done:okProject(p),ready:true});steps.push({n:2,title:'Roll / Active Roll',detail:'Roll number must be active before panels are useful.',href:'./field-capture.html#roll',done:okRoll(s.x),ready:okProject(p)});steps.push({n:3,title:'Panel 1',detail:'Add first panel with panel length.',href:'./field-capture.html#panel',done:s.pan.length>=1,ready:okProject(p)&&okRoll(s.x)});steps.push({n:4,title:'Panel 2',detail:'Second panel required before production seam.',href:'./field-capture.html#panel',done:s.pan.length>=2,ready:s.pan.length>=1});steps.push({n:5,title:'Wedge / Extrusion Weld Test',detail:'3 samples before actual production welding.',href:'./weld-test.html',done:s.weld.length>=1,ready:s.pan.length>=2});steps.push({n:6,title:'Seam / Wedge Weld',detail:'Create seam after two panels and weld test. Length auto-fills from panel length.',href:'./field-capture.html#seam',done:s.seams.length>=1&&s.feet>0,ready:s.pan.length>=2&&s.weld.length>=1});steps.push({n:7,title:'Air Test',detail:'After seam. Default 40 PSI, 5 min, max 4 PSI drop unless job spec changes.',href:'./field-capture.html#air',done:s.seams.length? s.air.length>=1:false,ready:s.seams.length>=1});steps.push({n:8,title:'DT 500 ft Tracker',detail:'DT due every full 500 ft of wedge seam.',href:'./dt-tracker.html',done:s.due===0||s.missingDT===0,ready:s.seams.length>=1});steps.push({n:9,title:'Destructive Test if Due',detail:'Each DT needs 5 samples. Only required when tracker says due.',href:'./destructive-test.html',done:s.due===0||s.dt.length>=s.due,ready:s.due>0});steps.push({n:10,title:'Repair / Map if Needed',detail:'Capture repairs or map points when needed.',href:'./repair-map-mode.html',done:s.rep.length>0,ready:true,optional:true});steps.push({n:11,title:'Run Mythos',detail:'Review warnings. Mythos routes to fixes and does not stop production.',href:'./mythos-agent.html',done:s.fails===0,ready:true});steps.push({n:12,title:'Office Package',detail:'Workbook, daily as-built, clean summary, raw backup.',href:'./office-package-builder.html',done:false,ready:s.pan.length||s.seams.length||s.weld.length||s.air.length||s.dt.length||s.rep.length});return{steps,s}}function render(){const p=cur();if(!p){$('summary').innerHTML='<div class="notice warn">No project found.</div>';return}const r=statusFor(p),s=r.s,counts={Panels:s.pan.length,Rolls:a(s.x.rolls).length,Seams:s.seams.length,Welds:s.weld.length,Air:s.air.length,DT:s.dt.length,'DT Due':s.due,Repairs:s.rep.length};$('summary').innerHTML='<div class="grid">'+Object.entries(counts).map(([k,v])=>`<div class="box"><strong>${v}</strong><span>${k}</span></div>`).join('')+'</div>';let next=r.steps.find(x=>!x.done&&x.ready&&!x.optional)||r.steps.find(x=>!x.done&&x.ready)||r.steps[r.steps.length-1];$('nextBox').className='notice '+(next.done?'ok':'warn');$('nextBox').innerHTML='<b>NEXT:</b> '+next.title+'<br>'+next.detail;document.body.dataset.next=next.href;$('steps').innerHTML=r.steps.map(x=>{let cls=x.done?'done':x.ready?'next':'wait';let label=x.done?'DONE':x.ready?'NEXT':'WAIT';if(x.optional&&!x.done){label='OPTIONAL';cls='wait'}return `<a class="step ${cls}" href="${x.ready||x.optional?x.href:'#'}"><div class="num">${x.n}</div><div><div class="title">${x.title}</div><div class="small">${x.detail}</div></div><span class="tag">${label}</span></a>`}).join('')}document.addEventListener('click',e=>{if(e.target.closest('#nextBox')){const href=document.body.dataset.next;if(href)location.href=href}});$('projectSelect').onchange=render;getProjects().then(r=>{projects=r||[];const s=$('projectSelect');s.innerHTML='';projects.forEach((p,i)=>{const o=document.createElement('option');o.value=i;o.textContent=(p.name||'Unnamed')+' — '+(p.area||'');s.appendChild(o)});$('status').textContent='Loaded '+projects.length+' project(s).';render()}).catch(e=>{$('status').textContent='Failed: '+e.message})</script></body></html>
