<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QC Logs Active</title>
<script>
window.onload=function(){
const active=localStorage.getItem("linersync-active-project");

if(!active){
document.body.innerHTML="<h2>No active project found.</h2>";
return;
}

window.location.href="./field-capture.html?project="+encodeURIComponent(active);
}
</script>
