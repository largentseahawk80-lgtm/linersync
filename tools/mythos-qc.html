<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Mythos QC Checker</title><style>body{margin:0;background:#020617;color:#e5e7eb;font-family:system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:900px;margin:0 auto;padding:18px}.card{background:#0f172a;border:1px solid #1f2937;border-radius:18px;padding:16px;margin:12px 0}h1{margin:0 0 8px}.sub{color:#94a3b8}.btn{width:100%;border:0;border-radius:14px;padding:16px;margin:8px 0;font-weight:900;font-size:15px;color:#fff;background:#2563eb;text-align:center;text-decoration:none;display:block}.green{background:#16a34a}.gray{background:#334155}.orange{background:#f97316}.red{background:#dc2626}.purple{background:#7c3aed}select,input{width:100%;background:#111827;color:#fff;border:1px solid #334155;border-radius:12px;padding:14px;font-size:16px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}.box{background:#020617;border:1px solid #1e293b;border-radius:14px;padding:12px}.box strong{display:block;font-size:24px}.box span{font-size:11px;color:#94a3b8;text-transform:uppercase;font-weight:900}.notice{background:#020617;border:1px solid #334155;border-radius:14px;padding:12px;margin:10px 0}.ok{border-color:#16a34a;color:#bbf7d0}.warn{border-color:#f97316;color:#fed7aa}.bad{border-color:#ef4444;color:#fecaca}.item{display:flex;gap:10px;align-items:flex-start;padding:12px;background:#020617;border:1px solid #1e293b;border-radius:14px;margin:8px 0}.check{width:28px;height:28px;border-radius:999px;display:grid;place-items:center;font-weight:900;flex:0 0 auto}.yes{background:#16a34a;color:white}.no{background:#f97316;color:white}.fail{background:#dc2626;color:white}.label{font-weight:900}.small{font-size:12px;color:#94a3b8;margin-top:2px}.pill{display:inline-block;background:#111827;border:1px solid #334155;border-radius:999px;padding:6px 10px;margin:4px;font-size:12px;color:#cbd5e1}textarea{width:100%;min-height:220px;background:#020617;color:#e5e7eb;border:1px solid #334155;border-radius:14px;padding:12px;font-size:13px}@media(min-width:700px){.grid{grid-template-columns:repeat(4,1fr)}}</style></head><body><main class="wrap"><section class="card"><h1>MYTHOS QC Checker</h1><p class="sub">Reads saved LinerSync logs and tells you what is missing, failed, open, or ready before you leave the site.</p><a class="btn gray" href="./export-center.html">← BACK TO EXPORT CENTER</a><div id="status">Loading projects...</div></section><section class="card"><label>Project</label><select id="projectSelect"></select><label>Check Date</label><input id="dateInput" type="date"><button class="btn purple" id="runBtn">RUN MYTHOS CHECK</button><div id="score"></div><div id="counts"></div></section><section class="card"><h3>Mythos Findings</h3><div id="findings"></div></section><section class="card"><h3>Office / Field Note</h3><textarea id="note" readonly>No check run yet.</textarea><button class="btn green" id="copyBtn">COPY MYTHOS NOTE</button><button class="btn orange" id="jsonBtn">DOWNLOAD MYTHOS CHECK JSON</button></section></main><script>
const DBN='linersync-db',DBV=2,STORE='projects';let projects=[];let lastReport=null;const $=id=>document.getElementById(id);const today=()=>new Date().toISOString().slice(0,10);const safe=s=>String(s||'project').replace(/[^a-z0-9_-]+/gi,'_').replace(/^_+|_+$/g,'')||'project';function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DBN,DBV);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);r.onupgradeneeded=()=>{}})}function getProjects(){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const r=tx.objectStore(STORE).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error)}))}function cur(){return projects[$('projectSelect').selectedIndex]||null}function d(p){return p?.data||{}}function isDate(v,date){return String(v||'').slice(0,10)===date}function dl(blob,name){const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u)}
function gps(x){const lat=Number(x?.lat??x?.gps?.lat??x?.latitude),lng=Number(x?.lng??x?.gps?.lng??x?.longitude);return !Number.isNaN(lat)&&!Number.isNaN(lng)&&lat!==0&&lng!==0}
function counts(p,date){const x=d(p);const panels=x.panels||[],seams=x.seams||[],air=x.airTests||[],dt=x.dTests||[],vac=x.vacuums||[],rolls=x.rolls||[],drone=x.dronePhotos||[],trial=(x.trialWelds||[]).concat(x.extWelds||[]);const daily={panels:panels.filter(r=>isDate(r.date,date)),seams:seams.filter(r=>isDate(r.date,date)),air:air.filter(r=>isDate(r.date,date)),dt:dt.filter(r=>isDate(r.date,date)),vac:vac.filter(r=>isDate(r.dateRep||r.date,date)),drone:drone.filter(r=>isDate(r.date,date)),trial:trial.filter(r=>isDate(r.date,date))};return{all:{panels,seams,air,dt,vac,rolls,drone,trial},daily,total:panels.length+seams.length+air.length+dt.length+vac.length+rolls.length+drone.length+trial.length}}
function missingBasic(p){const miss=[];if(!p?.name)miss.push('Project name');if(!p?.area)miss.push('Area / pond / cell');if(!p?.material)miss.push('Material');return miss}
function airFail(a){const drop=(Number(a.sPsi)-Number(a.ePsi));return a.pass===false||Number(a.sPsi)<30||drop>4}
function airOpen(a){return !a.seam||!a.sPsi||!a.ePsi||!a.sTime||!a.eTime}
function dtFail(x){return String(x.pass||x.result||'').toLowerCase().includes('fail')}
function vacFail(x){return x.pass===false}
function item(level,label,small){const cls=level==='ok'?'yes':level==='fail'?'fail':'no';const mark=level==='ok'?'✓':level==='fail'?'✕':'!';return `<div class="item"><div class="check ${cls}">${mark}</div><div><div class="label">${label}</div><div class="small">${small}</div></div></div>`}
function cards(c){return '<div class="grid">'+Object.entries({Panels:c.all.panels.length,Seams:c.all.seams.length,'Weld Tests':c.all.trial.length,Air:c.all.air.length,DT:c.all.dt.length,Repairs:c.all.vac.length,Rolls:c.all.rolls.length,Drone:c.all.drone.length}).map(([k,v])=>`<div class="box"><strong>${v}</strong><span>${k}</span></div>`).join('')+'</div>'}
function run(){const p=cur(),date=$('dateInput').value||today();if(!p)return;const c=counts(p,date),find=[];const basics=missingBasic(p);find.push(item(basics.length?'warn':'ok','Project header fields',basics.length?'Missing: '+basics.join(', '):'Project header looks usable.'));
find.push(item(c.total?'ok':'warn','Saved QC records',c.total?c.total+' total saved records found.':'No saved QC records found yet.'));
find.push(item(c.daily.panels.length+c.daily.seams.length+c.daily.air.length+c.daily.dt.length+c.daily.vac.length+c.daily.drone.length?'ok':'warn','Today / selected date records',date+': '+(c.daily.panels.length+c.daily.seams.length+c.daily.air.length+c.daily.dt.length+c.daily.vac.length+c.daily.drone.length)+' records found.'));
const badAir=c.all.air.filter(airFail),openAir=c.all.air.filter(airOpen);find.push(item(badAir.length?'fail':'ok','Air test failures',badAir.length?badAir.length+' air test(s) appear failed.':'No failed air tests detected.'));
find.push(item(openAir.length?'warn':'ok','Air test missing fields',openAir.length?openAir.length+' air test(s) missing seam/time/pressure fields.':'Air test required fields look complete.'));
const badDt=c.all.dt.filter(dtFail);find.push(item(badDt.length?'fail':'ok','Destructive test failures',badDt.length?badDt.length+' destructive test failure(s) detected.':'No destructive failures detected.'));
const openDt=c.all.dt.filter(x=>!x.dtNum||!x.seam||!x.loc);find.push(item(openDt.length?'warn':'ok','Destructive missing fields',openDt.length?openDt.length+' DT record(s) missing DT number, seam, or location.':'DT required fields look complete.'));
const badVac=c.all.vac.filter(vacFail);find.push(item(badVac.length?'fail':'ok','Vacuum / repair failures',badVac.length?badVac.length+' vacuum/repair failure(s) detected.':'No vacuum repair failures detected.'));
const openVac=c.all.vac.filter(x=>!x.repNum||!x.loc||!x.type);find.push(item(openVac.length?'warn':'ok','Vacuum repair missing fields',openVac.length?openVac.length+' repair record(s) missing repair number, location, or type.':'Vacuum repair fields look complete.'));
const rollUsed=c.all.panels.filter(x=>x.roll).length;find.push(item(c.all.panels.length&&!rollUsed?'warn':'ok','Roll usage link',c.all.panels.length?rollUsed+' of '+c.all.panels.length+' panels have roll numbers.':'No panel records yet.'));
const droneGps=c.all.drone.filter(gps).length;find.push(item(c.all.drone.length&&!droneGps?'warn':(droneGps?'ok':'warn'),'Drone GPS / EXIF',c.all.drone.length?droneGps+' of '+c.all.drone.length+' drone/photo records have GPS.':'No drone photo records saved yet.'));
const failCount=badAir.length+badDt.length+badVac.length;const warnCount=basics.length+openAir.length+openDt.length+openVac.length+(c.total?0:1)+(c.daily.panels.length+c.daily.seams.length+c.daily.air.length+c.daily.dt.length+c.daily.vac.length+c.daily.drone.length?0:1)+(c.all.panels.length&&!rollUsed?1:0)+(c.all.drone.length&&!droneGps?1:0)+(!c.all.drone.length?1:0);const status=failCount?'NOT READY - FAILURES FOUND':warnCount?'NEEDS REVIEW':'READY';$('score').className='notice '+(failCount?'bad':warnCount?'warn':'ok');$('score').innerHTML='<b>MYTHOS STATUS: '+status+'</b><br>Failures: '+failCount+' | Warnings: '+warnCount;$('counts').innerHTML=cards(c);$('findings').innerHTML=find.join('');const note=`MYTHOS QC CHECK\nProject: ${p.name||''}\nArea: ${p.area||''}\nMaterial: ${p.material||''}\nCheck Date: ${date}\nStatus: ${status}\nFailures: ${failCount}\nWarnings: ${warnCount}\n\nCounts:\nPanels: ${c.all.panels.length}\nSeams: ${c.all.seams.length}\nWeld Tests: ${c.all.trial.length}\nAir Tests: ${c.all.air.length}\nDestructive Tests: ${c.all.dt.length}\nVacuum Repairs: ${c.all.vac.length}\nRolls: ${c.all.rolls.length}\nDrone Photos: ${c.all.drone.length}\nDrone GPS Points: ${droneGps}\n\nMain issues:\n${find.map(x=>x.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim()).join('\n')}`;$('note').value=note;lastReport={project:p.name,area:p.area,material:p.material,date,status,failures:failCount,warnings:warnCount,counts:c,droneGps,generatedAt:new Date().toISOString()}}
async function copy(){try{await navigator.clipboard.writeText($('note').value);$('score').className='notice ok';$('score').innerHTML='<b>Mythos note copied.</b>'}catch(e){$('score').className='notice warn';$('score').innerHTML='<b>Copy failed.</b><br>Select the note and copy manually.'}}
function json(){if(!lastReport)run();dl(new Blob([JSON.stringify(lastReport,null,2)],{type:'application/json'}),safe(cur()?.name||'LinerSync')+'_MYTHOS_QC_CHECK_'+today()+'.json')}
$('dateInput').value=today();$('projectSelect').addEventListener('change',run);$('dateInput').addEventListener('change',run);$('runBtn').addEventListener('click',run);$('copyBtn').addEventListener('click',copy);$('jsonBtn').addEventListener('click',json);getProjects().then(r=>{projects=r||[];const s=$('projectSelect');s.innerHTML='';projects.forEach((p,i)=>{const o=document.createElement('option');o.value=i;o.textContent=(p.name||'Unnamed Project')+' — '+(p.area||'');s.appendChild(o)});$('status').textContent='Loaded '+projects.length+' project(s).';run()}).catch(e=>{$('status').textContent='Failed to read IndexedDB: '+e.message})
</script></body></html>
