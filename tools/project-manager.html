<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>LinerSync Project Manager</title><style>:root{--bg:#020617;--card:#0f172a;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--blue:#2563eb;--green:#16a34a;--gold:#ca8a04;--red:#dc2626;--cyan:#0891b2;--orange:#f97316}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:820px;margin:0 auto;padding:14px 12px 112px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0}h1{font-size:26px;margin:0 0 6px}.sub,.small{color:var(--muted);font-size:13px}.strip{display:flex;gap:8px;overflow-x:auto;white-space:nowrap;padding:8px 0}.chip{flex:0 0 auto;border-radius:999px;padding:10px 13px;font-weight:950;font-size:12px;color:#fff;text-decoration:none}.gray{background:#334155}.gold{background:var(--gold)}.red{background:var(--red)}.green{background:var(--green)}.cyan{background:var(--cyan)}.blue{background:var(--blue)}label{display:block;margin-top:10px;font-size:12px;font-weight:950;color:#cbd5e1}input,select,textarea{width:100%;background:#111827;color:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;font-size:16px}textarea{min-height:62px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.btn{width:100%;border:0;border-radius:15px;padding:16px;margin:9px 0;font-weight:950;font-size:15px;color:#fff;background:var(--blue);text-align:center;text-decoration:none;display:block}.notice{background:#020617;border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0}.ok{border-color:var(--green);color:#bbf7d0}.warn{border-color:var(--orange);color:#fed7aa}.bad{border-color:var(--red);color:#fecaca}.item{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:#020617;border:1px solid #1e293b;border-radius:14px;padding:12px;margin:8px 0}.item.active{border-color:#16a34a;background:rgba(22,163,74,.08)}.tag{font-size:11px;font-weight:950;border:1px solid #334155;border-radius:999px;padding:6px 9px;color:#cbd5e1}.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(15,23,42,.96);border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.nav{border-radius:14px;padding:12px 4px;min-height:50px;color:#fff;font-weight:950;font-size:12px;text-decoration:none;text-align:center}@media(min-width:760px){.grid{grid-template-columns:repeat(4,1fr)}.bottom{left:50%;transform:translateX(-50%);max-width:720px;border-radius:18px 18px 0 0}}@media(max-width:430px){.wrap{padding:10px 10px 108px}.card{padding:12px}.grid{grid-template-columns:repeat(2,1fr)}}</style></head><body><main class="wrap"><section class="card"><h1>Project Manager</h1><p class="sub">Create the job first. Then every module uses the same project store.</p><div class="strip"><a class="chip gray" href="./capture-menu.html">Capture</a><a class="chip blue" href="./field-capture.html">QC Logs</a><a class="chip gold" href="./workflow-checklist.html">Workflow</a><a class="chip green" href="./office-package-builder.html">Office Package</a></div><div id="status" class="notice">Loading projects...</div></section><section class="card"><h3>Create New Project</h3><div class="grid"><div><label>Project Name</label><input id="name" placeholder="Example: South Yuma Landfill"></div><div><label>Area / Cell / Pond</label><input id="area" placeholder="Cell 1 / Pond 3"></div><div><label>Material</label><select id="material"><option>60-mil HDPE Smooth</option><option>60-mil HDPE Textured</option><option>80-mil HDPE Smooth</option><option>80-mil HDPE Textured</option><option>40-mil LLDPE Smooth</option><option>Other</option></select></div><div><label>Thickness</label><select id="thickness"><option>60 mil</option><option>80 mil</option><option>40 mil</option><option>Other</option></select></div><div><label>Default Width ft</label><input id="width" type="number" inputmode="decimal" placeholder="23"></div><div><label>Active Roll</label><input id="roll" placeholder="Optional"></div><div><label>Air Start PSI</label><input id="airStart" type="number" inputmode="decimal" value="40"></div><div><label>Air Hold Min</label><input id="airHold" type="number" inputmode="decimal" value="5"></div><div><label>Air Max Drop PSI</label><input id="airDrop" type="number" inputmode="decimal" value="4"></div></div><label>Notes</label><textarea id="notes" placeholder="Optional job notes"></textarea><button class="btn green" id="createBtn">CREATE PROJECT</button><button class="btn blue" id="createOpenBtn">CREATE + OPEN QC LOGS</button><div id="last" class="notice">No project created this session.</div></section><section class="card"><h3>Existing Projects</h3><div id="projects"></div></section></main><nav class="bottom"><a class="nav blue" href="./capture-menu.html">CAPTURE</a><a class="nav gold" href="./mythos-agent.html">MYTHOS</a><a class="nav red" href="./final-package.html">FINAL</a><a class="nav green" href="./export-center.html">EXPORT</a></nav><script>const DBN='linersync-db',DBV=2,STORE='projects';let projects=[];const $=id=>document.getElementById(id);function uid(){return Date.now().toString()}function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DBN,DBV);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:'id'})}})}function getProjects(){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly'),r=tx.objectStore(STORE).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error)}))}function saveProject(p){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite'),r=tx.objectStore(STORE).put(p);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)}))}function v(id){return $(id).value.trim()}function n(id,def){return Number($(id).value)||def||0}function setActive(id){localStorage.setItem('linersync-active-project-id',id)}function render(){const active=localStorage.getItem('linersync-active-project-id');$('projects').innerHTML=projects.length?projects.map(p=>'<div class="item '+(p.id===active?'active':'')+'"><div><b>'+((p.name||'Unnamed'))+'</b><div class="small">'+(p.area||'No area')+' | '+(p.material||'No material')+'</div></div><button class="tag" onclick="activate(\''+p.id+'\')">USE</button></div>').join(''):'<div class="notice warn">No projects yet. Create one above.</div>';$('status').className='notice ok';$('status').textContent='Loaded '+projects.length+' project(s).'}async function reload(){projects=await getProjects();render()}window.activate=function(id){setActive(id);render();$('last').className='notice ok';$('last').textContent='Active project set. Open QC Logs or Workflow next.'}async function createProject(openAfter){const name=v('name');if(!name){$('last').className='notice warn';$('last').textContent='Project name is required.';return}const id=uid();const p={id,name,area:v('area'),material:$('material').value,notes:v('notes'),createdAt:new Date().toISOString(),data:{activeThickness:$('thickness').value,activeWidth:v('width'),activeRoll:v('roll'),activeType:$('material').value,airStartPsi:n('airStart',40),airHoldMin:n('airHold',5),airMaxDropPsi:n('airDrop',4),panels:[],rolls:[],seams:[],trialWelds:[],extWelds:[],airTests:[],dTests:[],vacuums:[],dronePhotos:[]}};await saveProject(p);setActive(id);$('last').className='notice ok';$('last').innerHTML='<b>Created:</b> '+name+'<br>Active project set.';await reload();if(openAfter)location.href='./field-capture.html'}$('createBtn').onclick=()=>createProject(false);$('createOpenBtn').onclick=()=>createProject(true);reload().catch(e=>{$('status').className='notice bad';$('status').textContent='Failed: '+e.message})</script></body></html>
