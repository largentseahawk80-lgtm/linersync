<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>LinerSync Project Manager</title><style>:root{--bg:#020617;--card:#0f172a;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--blue:#2563eb;--green:#16a34a;--gold:#ca8a04;--red:#dc2626;--cyan:#0891b2;--orange:#f97316}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:820px;margin:0 auto;padding:14px 12px 150px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0}h1{font-size:26px;margin:0 0 6px}.sub,.small{color:var(--muted);font-size:13px}.strip{display:flex;gap:8px;overflow-x:auto;white-space:nowrap;padding:8px 0}.chip{flex:0 0 auto;border-radius:999px;padding:10px 13px;font-weight:950;font-size:12px;color:#fff;text-decoration:none}.gray{background:#334155}.gold{background:var(--gold)}.red{background:var(--red)}.green{background:var(--green)}.cyan{background:var(--cyan)}.blue{background:var(--blue)}label{display:block;margin-top:10px;font-size:12px;font-weight:950;color:#cbd5e1}input,select,textarea{width:100%;background:#111827;color:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;font-size:16px}textarea{min-height:62px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.btn{width:100%;border:0;border-radius:15px;padding:17px;margin:9px 0;font-weight:950;font-size:15px;color:#fff;background:var(--blue);text-align:center;text-decoration:none;display:block}.btn:active{transform:scale(.98)}.notice{background:#020617;border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0}.ok{border-color:var(--green);color:#bbf7d0}.warn{border-color:var(--orange);color:#fed7aa}.bad{border-color:var(--red);color:#fecaca}.item{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:#020617;border:1px solid #1e293b;border-radius:14px;padding:12px;margin:8px 0}.item.active{border-color:#16a34a;background:rgba(22,163,74,.08)}.tag{font-size:11px;font-weight:950;border:1px solid #334155;border-radius:999px;padding:8px 11px;color:#cbd5e1;background:#111827}.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(15,23,42,.96);border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.nav{border-radius:14px;padding:12px 4px;min-height:50px;color:#fff;font-weight:950;font-size:12px;text-decoration:none;text-align:center}@media(min-width:760px){.grid{grid-template-columns:repeat(4,1fr)}.bottom{left:50%;transform:translateX(-50%);max-width:720px;border-radius:18px 18px 0 0}}@media(max-width:430px){.wrap{padding:10px 10px 150px}.card{padding:12px}.grid{grid-template-columns:repeat(2,1fr)}}</style></head><body><main class="wrap"><section class="card"><h1>Project Manager</h1><p class="sub">Create the job first. If project name is blank, this still creates a timestamped field project.</p><div class="strip"><a class="chip gray" href="./capture-menu.html">Capture</a><a class="chip blue" href="./field-capture.html">QC Logs</a><a class="chip gold" href="./workflow-checklist.html">Workflow</a><a class="chip green" href="./office-package-builder.html">Office Package</a></div><div id="status" class="notice">Loading projects...</div></section><section class="card"><h3>Create New Project</h3><div class="grid"><div><label>Project Name</label><input id="projectName" placeholder="Example: South Yuma Landfill"></div><div><label>Area / Cell / Pond</label><input id="projectArea" placeholder="Cell 1 / Pond 3"></div><div><label>Material</label><select id="material"><option>60-mil HDPE Smooth</option><option>60-mil HDPE Textured</option><option>80-mil HDPE Smooth</option><option>80-mil HDPE Textured</option><option>40-mil LLDPE Smooth</option><option>Other</option></select></div><div><label>Thickness</label><select id="thickness"><option>60 mil</option><option>80 mil</option><option>40 mil</option><option>Other</option></select></div><div><label>Default Width ft</label><input id="width" type="number" inputmode="decimal" placeholder="23" value="23"></div><div><label>Active Roll</label><input id="roll" placeholder="Optional"></div><div><label>Air Start PSI</label><input id="airStart" type="number" inputmode="decimal" value="40"></div><div><label>Air Hold Min</label><input id="airHold" type="number" inputmode="decimal" value="5"></div><div><label>Air Max Drop PSI</label><input id="airDrop" type="number" inputmode="decimal" value="4"></div></div><label>Notes</label><textarea id="notes" placeholder="Optional job notes"></textarea><button type="button" class="btn green" id="createBtn">CREATE PROJECT</button><button type="button" class="btn blue" id="createOpenBtn">CREATE + OPEN QC LOGS</button><div id="last" class="notice">Ready. Tap CREATE PROJECT.</div></section><section class="card"><h3>Existing Projects</h3><div id="projects"></div></section></main><nav class="bottom"><a class="nav blue" href="./capture-menu.html">CAPTURE</a><a class="nav gold" href="./mythos-agent.html">MYTHOS</a><a class="nav red" href="./final-package.html">FINAL</a><a class="nav green" href="./export-center.html">EXPORT</a></nav><script>const DBN='linersync-db';const DBV=2;const STORE='projects';let projects=[];function el(id){return document.getElementById(id)}function text(id){const x=el(id);return x?String(x.value||'').trim():''}function num(id,def){const n=Number(text(id));return Number.isFinite(n)&&n>0?n:def}function uid(){return String(Date.now())+'-'+Math.random().toString(36).slice(2,7)}function clean(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}function msg(kind,html){const box=el('last');box.className='notice '+kind;box.innerHTML=html}function openDB(){return new Promise(function(resolve,reject){const req=indexedDB.open(DBN,DBV);req.onerror=function(){reject(req.error||new Error('IndexedDB open failed'))};req.onupgradeneeded=function(e){const db=e.target.result;if(!db.objectStoreNames.contains(STORE)){db.createObjectStore(STORE,{keyPath:'id'})}};req.onsuccess=function(){resolve(req.result)}})}async function getProjects(){const db=await openDB();return new Promise(function(resolve,reject){let tx;try{tx=db.transaction(STORE,'readonly')}catch(e){db.close();reject(e);return}const req=tx.objectStore(STORE).getAll();req.onerror=function(){reject(req.error)};req.onsuccess=function(){resolve(req.result||[])};tx.oncomplete=function(){db.close()}})}async function saveProject(project){const db=await openDB();return new Promise(function(resolve,reject){const tx=db.transaction(STORE,'readwrite');const req=tx.objectStore(STORE).put(project);req.onerror=function(){reject(req.error)};req.onsuccess=function(){resolve(true)};tx.oncomplete=function(){db.close()}})}function setActive(id){localStorage.setItem('linersync-active-project-id',id);localStorage.setItem('linersync-current-project-id',id)}function activeId(){return localStorage.getItem('linersync-active-project-id')||''}function render(){const active=activeId();el('projects').innerHTML=projects.length?projects.map(function(p){return '<div class="item '+(p.id===active?'active':'')+'"><div><b>'+clean(p.name||'Unnamed')+'</b><div class="small">'+clean(p.area||'No area')+' | '+clean(p.material||'No material')+'</div></div><button type="button" class="tag" data-use="'+p.id+'">USE</button></div>'}).join(''):'<div class="notice warn">No projects yet. Create one above.</div>';el('status').className='notice ok';el('status').textContent='Loaded '+projects.length+' project(s).';document.querySelectorAll('[data-use]').forEach(function(btn){btn.onclick=function(){setActive(btn.getAttribute('data-use'));render();msg('ok','<b>Active project set.</b><br>Open QC Logs or Workflow next.')}})}async function reload(){projects=await getProjects();render()}async function createProject(openAfter){try{msg('warn','Creating project...');const id=uid();const mat=text('material')||'60-mil HDPE Smooth';const name=text('projectName')||('FIELD PROJECT '+new Date().toLocaleString());const project={id:id,name:name,area:text('projectArea'),material:mat,notes:text('notes'),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),data:{activeThickness:text('thickness')||'60 mil',activeWidth:text('width')||'23',activeRoll:text('roll'),activeType:mat,airStartPsi:num('airStart',40),airHoldMin:num('airHold',5),airMaxDropPsi:num('airDrop',4),panels:[],rolls:[],seams:[],trialWelds:[],extWelds:[],airTests:[],dTests:[],vacuums:[],dronePhotos:[]}};await saveProject(project);setActive(id);await reload();msg('ok','<b>Created:</b> '+clean(name)+'<br>Active project set.');if(openAfter){setTimeout(function(){location.href='./field-capture.html#header'},450)}}catch(e){msg('bad','<b>Create failed:</b><br>'+clean(e.message||e));el('status').className='notice bad';el('status').textContent='Create failed. See message below.';console.error(e)}}function bind(){el('createBtn').onclick=function(){createProject(false)};el('createOpenBtn').onclick=function(){createProject(true)};reload().catch(function(e){el('status').className='notice bad';el('status').textContent='Load failed: '+(e.message||e);msg('bad','<b>Load failed:</b><br>'+clean(e.message||e)+'<br>Refresh once.')}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',bind)}else{bind()}</script></body></html>
