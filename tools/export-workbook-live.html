<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>LinerSync Live Export</title><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script><style>body{margin:0;background:#020617;color:#e5e7eb;font-family:system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:900px;margin:0 auto;padding:18px}.card{background:#0f172a;border:1px solid #1f2937;border-radius:18px;padding:16px;margin:12px 0}.btn{width:100%;border:0;border-radius:14px;padding:16px;margin:8px 0;font-weight:900;font-size:15px;color:#fff;background:#2563eb}.green{background:#16a34a}.gray{background:#334155}.counts{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}.count{background:#020617;border:1px solid #1e293b;border-radius:14px;padding:12px}.count strong{display:block;font-size:22px}.count span{font-size:11px;color:#94a3b8;text-transform:uppercase;font-weight:800}.notice{border:1px solid #334155;background:#020617;border-radius:14px;padding:12px;margin:10px 0}.ok{border-color:#16a34a;color:#bbf7d0}.warn{border-color:#f97316;color:#fed7aa}.bad{border-color:#ef4444;color:#fecaca}select{width:100%;background:#111827;color:#fff;border:1px solid #334155;border-radius:12px;padding:14px;font-size:16px}pre{white-space:pre-wrap;color:#cbd5e1;background:#020617;border:1px solid #1e293b;border-radius:12px;padding:12px;max-height:300px;overflow:auto}.pill{display:inline-block;background:#111827;border:1px solid #334155;border-radius:999px;padding:6px 10px;margin:4px;font-size:12px;color:#cbd5e1}@media(min-width:700px){.counts{grid-template-columns:repeat(4,1fr)}}</style></head><body><main class="wrap"><section class="card"><h1>LinerSync Live Export</h1><p>Live project exporter. Weld Test exports 3 samples. Destructive exports 5 samples.</p><button class="btn gray" onclick="location.href='./export-center.html'">← BACK TO EXPORT CENTER</button><div id="status">Loading projects...</div></section><section class="card"><label>Project selected</label><select id="projectSelect"></select><div id="counts"></div><div id="warningBox"></div><button class="btn green" id="exportBtn">EXPORT CQA XLSX WORKBOOK</button><button class="btn" id="dailyBtn">EXPORT DAILY AS-BUILT XLSX</button><button class="btn gray" id="jsonBtn">DOWNLOAD RAW PROJECT JSON</button><div id="lastExport" class="notice">No file exported yet.</div></section><section class="card"><h3>Sheet rule</h3><span class="pill">WELD TEST = TEST #1-#3</span><span class="pill">DESTRUCTIVE = TEST #1-#5</span><span class="pill">AIR TEST</span><span class="pill">VACUUM</span><span class="pill">DAILY AS-BUILT</span></section><section class="card"><h3>Debug</h3><pre id="debug">No project selected.</pre></section></main><script>
const DBN='linersync-db',DBV=2,STORE_PROJ='projects';let projects=[];const $=id=>document.getElementById(id);const today=()=>new Date().toISOString().slice(0,10);const safe=s=>String(s||'project').replace(/[^a-z0-9_-]+/gi,'_').replace(/^_+|_+$/g,'')||'project';const val=v=>v==null?'':v;const yes=v=>v===true?'PASS':v===false?'FAIL':(v||'');
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DBN,DBV);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);r.onupgradeneeded=()=>{}})}
function getProjects(){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE_PROJ,'readonly');const r=tx.objectStore(STORE_PROJ).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error)}))}
function pData(p){return p.data||{}}function cur(){return projects[$('projectSelect').selectedIndex]||null}function arr(v){return Array.isArray(v)?v.join(' / '):(v||'')}function dl(blob,name){const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u)}
function counts(d){return{panels:(d.panels||[]).length,seams:(d.seams||[]).length,air:(d.airTests||[]).length,dt:(d.dTests||[]).length,repairs:(d.vacuums||[]).length,rolls:(d.rolls||[]).length,weldTests:(d.trialWelds||[]).length+(d.extWelds||[]).length,drone:(d.dronePhotos||[]).length}}function total(c){return Object.values(c).reduce((a,b)=>a+b,0)}
function cards(c){return '<div class="counts">'+Object.entries({Panels:c.panels,Seams:c.seams,Air:c.air,DT:c.dt,Repairs:c.repairs,Rolls:c.rolls,'Weld Tests':c.weldTests,Drone:c.drone}).map(([k,v])=>`<div class="count"><strong>${v}</strong><span>${k}</span></div>`).join('')+'</div>'}
function sheet(wb,name,h,r){const ws=XLSX.utils.aoa_to_sheet([h,...r]);ws['!cols']=h.map(x=>({wch:Math.max(14,String(x).length+2)}));XLSX.utils.book_append_sheet(wb,ws,name.slice(0,31))}
function testText(x,n){if(Array.isArray(x?.tests)&&x.tests[n-1])return arr(x.tests[n-1]);const keys=[`test${n}`,`test${n}Result`,`sample${n}`];for(const k of keys)if(x?.[k])return x[k];if(n===1&&(x?.iP||x?.oP||x?.sh))return `Peel ${arr(x.iP)} / ${arr(x.oP)} - Shear ${arr(x.sh)}`;return ''}
function workbook(p,onlyDaily=false){if(!window.XLSX)throw new Error('XLSX library did not load');const d=pData(p),wb=XLSX.utils.book_new();const panels=d.panels||[],seams=d.seams||[],air=d.airTests||[],trials=d.trialWelds||[],ext=d.extWelds||[],dts=d.dTests||[],vac=d.vacuums||[],rolls=d.rolls||[],drone=d.dronePhotos||[];sheet(wb,'PROJECT',['FIELD','VALUE'],[['Project Name',val(p.name)],['Area / Pond / Cell',val(p.area)],['Material',val(p.material)],['Contractor / Installer',val(p.contractor)],['Minimum Air PSI',val(p.specs?.minPsi)],['Maximum Air Drop',val(p.specs?.maxDrop)],['Air Hold Minutes',val(p.specs?.holdMin)],['DT Interval Ft',val(p.specs?.dtInterval||500)],['Export Date',new Date().toLocaleString()]]);if(!onlyDaily){sheet(wb,'PANEL PLACEMENT',['DATE','PANEL NUMBER','ROLL NUMBER','PANEL WIDTH','PANEL LENGTH','SQUARE FOOTAGE','ZONE','GPS LAT','GPS LNG','GPS ACC','COMMENTS'],panels.map(x=>[x.date,x.num,x.roll,x.w,x.l,x.area,x.zone,x.gps?.lat||x.lat||'',x.gps?.lng||x.lng||'',x.gps?.acc||'',x.comments||x.note||'']));sheet(wb,'ROLL INVENTORY',['ROLL NUMBER','MANUFACTURER','MATERIAL','THICKNESS','WIDTH','LENGTH','SQUARE FOOTAGE','STATUS','DELIVERY DATE','ASSIGNED PANELS','NOTES'],rolls.map(x=>[x.num||x.roll||x.rollNumber,x.manufacturer,x.material,x.thickness,x.w||x.width,x.l||x.length,x.area||x.sf,x.status,x.deliveryDate,arr(x.assignedPanels),x.notes||'']));sheet(wb,'WEDGE WELD',['DATE','TIME','SEAM NUMBER','SEAMER INITIALS','MACHINE NUMBER','TEMP SETTING','SPEED SETTING','LENGTH','WEATHER','GPS LAT','GPS LNG','COMMENTS'],seams.map(x=>[x.date,x.time,x.num,x.seamer,x.machine,x.temp,x.speed,x.len,x.weather,x.gps?.lat||x.lat||'',x.gps?.lng||x.lng||'',x.comments||x.note||'']));const weldRows=trials.concat(ext).map(x=>[x.date,x.time,x.qc,x.welder,x.machine,x.type||'Weld',x.seam||'',x.temp,x.speed,testText(x,1),testText(x,2),testText(x,3),x.pass||x.result||'',x.comments||'']);sheet(wb,'WELD TEST',['DATE','TIME','QC INITIALS','WELDER INITIALS','MACHINE NUMBER','TYPE','SEAM NUMBER','TEMP SETTING','SPEED SETTING','TEST #1','TEST #2','TEST #3','RESULT','COMMENTS'],weldRows);sheet(wb,'AIR TEST',['DATE','SEAM NUMBER','START TIME','START PRESSURE','END TIME','END PRESSURE','PRESSURE DROP','TEST MINUTES','PASS / FAIL','TESTER','WEATHER','COMMENTS'],air.map(x=>[x.date,x.seam,x.sTime,x.sPsi,x.eTime,x.ePsi,(Number(x.sPsi)-Number(x.ePsi))||'',x.minutes||x.holdMin||'',yes(x.pass),x.tester,x.weather,x.comments||'']));sheet(wb,'DESTRUCTIVE',['DATE','DT NUMBER','SEAM NUMBER','LOCATION','WELDER INITIALS','MACHINE NUMBER','TEMP SETTING','SPEED SETTING','TEST #1','TEST #2','TEST #3','TEST #4','TEST #5','LAB SENT','RESULT','REPAIR COMPLETE','COMMENTS'],dts.map(x=>[x.date,x.dtNum,x.seam,x.loc,x.welder,x.machine,x.temp,x.speed,testText(x,1),testText(x,2),testText(x,3),testText(x,4),testText(x,5),x.labSent?'YES':'NO',x.pass||x.result||'',x.repairComplete?'YES':'NO',x.comments||'']));sheet(wb,'VACUUM',['DATE REPAIRED','REPAIR NUMBER','SEAM LOCATION','REPAIRED BY','TYPE OF REPAIR','NUMBER OF LEAKS','RETEST','DATE ACCEPTED','TESTER','DT REF','PASS / FAIL','COMMENTS'],vac.map(x=>[x.dateRep,x.repNum,x.loc,x.by,x.type,x.leaks,x.retest,x.dateAccept,x.tester,x.dt,yes(x.pass),x.comments||'']));sheet(wb,'DRONE PHOTOS',['DATE','FILE NAME','LAT','LNG','ACCURACY','ALTITUDE','MAP POINT','NOTES'],drone.map(x=>[x.date||'',x.name||x.fileName||'',x.lat||x.gps?.lat||'',x.lng||x.gps?.lng||'',x.acc||x.gps?.acc||'',x.alt||'',x.point||'',x.notes||'']))}const dates=[...new Set([].concat(panels.map(x=>x.date),seams.map(x=>x.date),air.map(x=>x.date),dts.map(x=>x.date),vac.map(x=>x.dateRep)).filter(Boolean))].sort();sheet(wb,'DAILY AS-BUILT',['DATE','PANELS PLACED','SQ FT PLACED','SEAMS WELDED','FT WELDED','AIR TESTS','DESTRUCTIVE TESTS','VACUUM REPAIRS','FAILED / OPEN ITEMS'],dates.map(date=>{const p2=panels.filter(x=>x.date===date),s2=seams.filter(x=>x.date===date),a2=air.filter(x=>x.date===date),dt2=dts.filter(x=>x.date===date),v2=vac.filter(x=>x.dateRep===date);return[date,p2.length,p2.reduce((n,x)=>n+(Number(x.area)||0),0),s2.length,s2.reduce((n,x)=>n+(Number(x.len)||0),0),a2.length,dt2.length,v2.length,a2.filter(x=>x.pass===false).length+dt2.filter(x=>String(x.pass||x.result).toLowerCase().includes('fail')).length+v2.filter(x=>x.pass===false).length]}));const open=[];air.forEach(x=>{if(x.pass===false)open.push(['AIR TEST',x.date,x.seam,'FAIL',`Start ${x.sPsi} End ${x.ePsi}`])});dts.forEach(x=>{if(String(x.pass||x.result).toLowerCase().includes('fail'))open.push(['DESTRUCTIVE',x.date,x.seam||x.dtNum,'FAIL',x.loc||''])});vac.forEach(x=>{if(x.pass===false)open.push(['VACUUM',x.dateRep,x.repNum,'FAIL',x.loc||''])});sheet(wb,'OPEN ITEMS',['TYPE','DATE','ID','STATUS','LOCATION / NOTE'],open);return wb}
function exportX(onlyDaily=false){try{const p=cur();if(!p)return alert('No project selected');const c=counts(pData(p)),name=`${safe(p.name||'LinerSync')}_${onlyDaily?'Daily_AsBuilt':'CQA_Workbook'}_${today()}.xlsx`;XLSX.writeFile(workbook(p,onlyDaily),name);$('lastExport').className='notice ok';$('lastExport').innerHTML=`Download started:<br><b>${name}</b><br>${total(c)} saved QC item(s).`; }catch(e){$('lastExport').className='notice bad';$('lastExport').innerHTML='Export failed:<br>'+e.message}}
function exportJson(){const p=cur();if(!p)return alert('No project selected');const c=counts(pData(p)),name=`${safe(p.name||'LinerSync')}_RAW_${today()}.json`;dl(new Blob([JSON.stringify(p,null,2)],{type:'application/json'}),name);$('lastExport').className='notice ok';$('lastExport').innerHTML=`JSON download started:<br><b>${name}</b><br>${total(c)} saved QC item(s).`}
function render(){const s=$('projectSelect');s.innerHTML='';projects.forEach((p,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${p.name||'Unnamed Project'} — ${p.area||''}`;s.appendChild(o)});summary()}
function summary(){const p=cur();if(!p){$('counts').innerHTML='No project found';$('warningBox').innerHTML='<div class="notice bad">Open the main app and save a project first.</div>';return}const c=counts(pData(p));$('counts').innerHTML=cards(c);$('warningBox').innerHTML=total(c)===0?'<div class="notice warn"><b>Missing-data warning</b><br>Zero saved QC records. Workbook will export project header and blank sheets.</div>':'<div class="notice ok"><b>Data ready</b><br>Saved QC records found.</div>';$('debug').textContent=JSON.stringify({selectedProject:p.name,area:p.area,material:p.material,counts:c,totalSavedQcItems:total(c),rule:'Weld Test 3 samples; Destructive 5 samples'},null,2)}
$('projectSelect').addEventListener('change',summary);$('exportBtn').addEventListener('click',()=>exportX(false));$('dailyBtn').addEventListener('click',()=>exportX(true));$('jsonBtn').addEventListener('click',exportJson);getProjects().then(r=>{projects=r||[];$('status').textContent=`Loaded ${projects.length} project(s) from LinerSync IndexedDB.`;render()}).catch(e=>{$('status').textContent='Failed to read IndexedDB: '+e.message})
</script></body></html>
