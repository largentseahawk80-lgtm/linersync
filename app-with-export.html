<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#020617" />
  <title>LinerSync Phone Build</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#020617;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
    iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#020617}
    .exportFab{position:fixed;right:max(14px,env(safe-area-inset-right,0px));top:calc(env(safe-area-inset-top,0px) + 14px);z-index:999999;border:0;border-radius:999px;padding:16px 20px;background:#16a34a;color:white;font-weight:950;font-size:14px;box-shadow:0 12px 36px rgba(22,163,74,.45);letter-spacing:.5px;min-height:56px;min-width:132px}
    .exportFab:active{transform:scale(.97)}
    .note{position:fixed;left:max(12px,env(safe-area-inset-left,0px));right:max(12px,env(safe-area-inset-right,0px));bottom:calc(env(safe-area-inset-bottom,0px) + 10px);z-index:999998;background:rgba(15,23,42,.92);color:#cbd5e1;border:1px solid rgba(148,163,184,.25);border-radius:16px;padding:12px 14px;font-size:13px;text-align:center;backdrop-filter:blur(12px);line-height:1.35}
    .hide{display:none}
    @media(max-width:430px){.exportFab{right:10px;top:calc(env(safe-area-inset-top,0px) + 10px);padding:14px 16px;min-width:116px;font-size:13px}}
  </style>
</head>
<body>
  <iframe src="./index.html" title="LinerSync Main App"></iframe>
  <button class="exportFab" onclick="location.href='./tools/export-center.html'">EXPORTS</button>
  <div id="note" class="note">S25/S26 phone shell: main app is untouched. Green EXPORTS opens Export Center, sample workbook, and live project exporter.</div>
  <script>setTimeout(()=>document.getElementById('note').classList.add('hide'),5500)</script>
</body>
</html>
