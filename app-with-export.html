<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#020617" />
  <title>LinerSync + Export</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#020617;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
    iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#020617}
    .exportFab{position:fixed;right:16px;top:calc(env(safe-area-inset-top,0px) + 16px);z-index:999999;border:0;border-radius:999px;padding:14px 18px;background:#16a34a;color:white;font-weight:950;font-size:13px;box-shadow:0 12px 36px rgba(22,163,74,.45);letter-spacing:.5px}
    .exportFab:active{transform:scale(.97)}
    .note{position:fixed;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom,0px) + 10px);z-index:999998;background:rgba(15,23,42,.9);color:#cbd5e1;border:1px solid rgba(148,163,184,.25);border-radius:14px;padding:10px 12px;font-size:12px;text-align:center;backdrop-filter:blur(12px)}
    .hide{display:none}
  </style>
</head>
<body>
  <iframe src="./index.html" title="LinerSync Main App"></iframe>
  <button class="exportFab" onclick="location.href='./export-workbook.html'">EXPORT XLS</button>
  <div id="note" class="note">Safe shell: main app is untouched. Green EXPORT XLS opens the workbook exporter.</div>
  <script>setTimeout(()=>document.getElementById('note').classList.add('hide'),5500)</script>
</body>
</html>
